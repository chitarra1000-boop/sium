<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Il Mercante Errante — Compendium del Dungeon Master</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Leaflet.js per Mappa del Mondo -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  [data-theme="dark"] {
    --bg-deep: #0a0807;
    --bg-base: #14100c;
    --bg-panel: #1c1612;
    --bg-panel-glass: rgba(28, 22, 18, 0.72);
    --bg-card: #221a14;
    --bg-card-elevated: #2a2018;
    --bg-sidebar: #110d0a;
    --border-subtle: rgba(201, 165, 92, 0.12);
    --border-soft: rgba(201, 165, 92, 0.22);
    --border-gold: rgba(201, 165, 92, 0.45);
    --gold: #d4b070;
    --gold-bright: #f0d490;
    --gold-dim: #8b6f3f;
    --gold-glow: rgba(232, 200, 120, 0.35);
    --text-strong: #f0e4cc;
    --text-main: #d8c9a8;
    --text-muted: #9c8a6b;
    --text-faint: #6a5a45;
    --blood: #8a2e2e;
    --copper: #c87a3a;
    --silver: #d0d0e0;
    --platinum: #e8e8ff;
    --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.4);
    --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-card-hover: 0 16px 48px rgba(0, 0, 0, 0.6), 0 0 32px rgba(232, 200, 120, 0.08);
    --shadow-modal: 0 32px 80px rgba(0, 0, 0, 0.85);
    --vignette: radial-gradient(ellipse at top, rgba(201, 165, 92, 0.06), transparent 55%);
  }
  [data-theme="light"] {
    --bg-deep: #e8dcc0;
    --bg-base: #f0e4c8;
    --bg-panel: #f5ebd2;
    --bg-panel-glass: rgba(245, 235, 210, 0.78);
    --bg-card: #faf2dc;
    --bg-card-elevated: #fdf6e4;
    --bg-sidebar: #e0d2b0;
    --border-subtle: rgba(120, 85, 40, 0.15);
    --border-soft: rgba(120, 85, 40, 0.28);
    --border-gold: rgba(140, 100, 50, 0.5);
    --gold: #8a6530;
    --gold-bright: #6b4a1c;
    --gold-dim: #a08858;
    --gold-glow: rgba(140, 100, 50, 0.25);
    --text-strong: #2a1f12;
    --text-main: #3d2e1c;
    --text-muted: #6b5538;
    --text-faint: #9a8458;
    --blood: #8a2424;
    --copper: #a8541c;
    --silver: #707080;
    --platinum: #5a5a78;
    --shadow-soft: 0 4px 16px rgba(80, 50, 20, 0.12);
    --shadow-card: 0 6px 20px rgba(80, 50, 20, 0.15);
    --shadow-card-hover: 0 12px 36px rgba(80, 50, 20, 0.22);
    --shadow-modal: 0 24px 60px rgba(80, 50, 20, 0.35);
    --vignette: radial-gradient(ellipse at top, rgba(180, 140, 80, 0.18), transparent 55%);
  }

  * { box-sizing: border-box; }
  html, body {
    background: var(--bg-base);
    color: var(--text-main);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    margin: 0;
    min-height: 100vh;
  }
  body { background-image: var(--vignette); background-attachment: fixed; }

  .flex { display: flex; }
  .inline-flex { display: inline-flex; }
  .flex-col { flex-direction: column; }
  .flex-1 { flex: 1; }
  .items-center { align-items: center; }
  .items-end { align-items: flex-end; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .flex-wrap { flex-wrap: wrap; }
  .gap-1 { gap: 0.25rem; } .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; }
  .gap-4 { gap: 1rem; } .gap-5 { gap: 1.25rem; }
  .mt-1 { margin-top: 0.25rem; } .mt-2 { margin-top: 0.5rem; } .mt-3 { margin-top: 0.75rem; }
  .mt-5 { margin-top: 1.25rem; } .mt-7 { margin-top: 1.75rem; } .mt-8 { margin-top: 2rem; }
  .mb-2 { margin-bottom: 0.5rem; } .mb-3 { margin-bottom: 0.75rem; } .mb-5 { margin-bottom: 1.25rem; }
  .pb-4 { padding-bottom: 1rem; } .pb-20 { padding-bottom: 5rem; }
  .pt-3 { padding-top: 0.75rem; } .pt-4 { padding-top: 1rem; }
  .text-center { text-align: center; }
  .text-lg { font-size: 18px; }
  .font-bold { font-weight: 700; } .font-semibold { font-weight: 600; }
  .italic { font-style: italic; }
  .uppercase { text-transform: uppercase; }
  .tracking-widest { letter-spacing: 0.2em; }
  .border-t { border-top: 1px solid var(--border-subtle); }
  .border-b { border-bottom: 1px solid var(--border-subtle); }

  .container-main { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
  @media (min-width: 640px) { .container-main { padding: 0 1.5rem; } }

  .font-display { font-family: 'Cinzel', Georgia, serif; }
  .font-rune { font-family: 'Uncial Antiqua', 'Cinzel', Georgia, serif; }
  .font-script { font-family: 'Cormorant Garamond', Georgia, serif; }

  .app-shell { display: flex; min-height: 100vh; }

  /* Wrapper contenuto — default e split con Regia */
  .content-wrap { display: flex; flex: 1; min-width: 0; }
  .content-wrap .main-content { flex: 1; min-width: 0; }
  .content-wrap.regia-split .main-content { flex: 0 0 75%; width: 75%; min-width: 0; }

  /* Pannello Regia Sonora — 25% destra, bloccato in altezza */
  .regia-panel {
    flex: 0 0 25%;
    width: 25%;
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    border-left: 1px solid var(--border-soft);
    overflow-y: auto;
    overflow-x: hidden;
  }
  @media (max-width: 900px) {
    .content-wrap.regia-split .main-content { flex: 1; width: 100%; }
    .regia-panel { display: none; } /* su mobile si nasconde — accedibile dal menu */
  }

  .regia-header {
    padding: 0.85rem 0.9rem 0.6rem;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--bg-sidebar);
    position: sticky; top: 0; z-index: 2;
  }
  .regia-header-title {
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold-bright);
    flex: 1;
  }
  .regia-header svg { color: var(--gold); width: 14px; height: 14px; flex-shrink: 0; }
  .regia-close {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-faint); padding: 0.1rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px; transition: color 0.15s;
  }
  .regia-close:hover { color: var(--gold); }
  .regia-close svg { width: 13px; height: 13px; }

  .regia-body { padding: 0.75rem 0.85rem; display: flex; flex-direction: column; gap: 0.7rem; flex: 1; min-height: 0; overflow-y: auto; }

  /* Selettore scena */
  .regia-section-lbl {
    font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--gold-dim);
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.25rem; margin-bottom: 0.2rem;
  }
  .regia-scene-select {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border-soft);
    color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 13px;
    padding: 0.45rem 0.6rem; border-radius: 3px; outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  .regia-scene-select:focus { border-color: var(--border-gold); }
  .regia-scene-select option { background: var(--bg-card); }

  /* Controlli volume traccia principale */
  .regia-main-controls {
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .regia-play-row {
    display: flex; align-items: center; gap: 0.4rem;
  }
  .regia-grade-btns {
    display: flex; gap: 0.25rem; flex: 1;
  }
  .btn-grade {
    flex: 1; padding: 0.28rem 0; border-radius: 3px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid;
    display: flex; align-items: center; justify-content: center; gap: 0.2rem;
    transition: all 0.18s ease;
  }
  .btn-grade-off { background: var(--bg-card); color: var(--text-faint); border-color: var(--border-subtle); }
  .btn-grade-off:hover { color: var(--text-muted); border-color: var(--border-soft); }
  .btn-grade-on { background: linear-gradient(180deg,rgba(201,165,92,0.22),rgba(201,165,92,0.08)); color: var(--gold-bright); border-color: var(--border-gold); }
  .btn-grade-active { background: linear-gradient(180deg,#c9a55c,#8b6f3f); color: #1a1208; border-color: #6b4f23; box-shadow: 0 2px 8px rgba(201,165,92,0.3); }

  /* SFX grid */
  .regia-sfx-grid {
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .regia-sfx-row {
    display: flex; align-items: center; gap: 0.4rem;
  }
  .regia-sfx-name {
    font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
    width: 52px; flex-shrink: 0;
  }
  .regia-sfx-btns { display: flex; gap: 0.2rem; flex: 1; }
  .btn-sfx-grade {
    flex: 1; padding: 0.22rem 0; border-radius: 2px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    border: 1px solid; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .btn-sfx-off { background: var(--bg-card); color: var(--text-faint); border-color: var(--border-subtle); }
  .btn-sfx-on  { background: rgba(100,150,80,0.12); color: #a0c878; border-color: rgba(100,150,80,0.4); }
  .btn-sfx-active { background: rgba(100,150,80,0.3); color: #c8e890; border-color: rgba(100,180,80,0.6); box-shadow: 0 0 6px rgba(100,200,80,0.2); }

  /* ---- GRIGLIA SCENE — stile card compendio ---- */
  .regia-scene-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
    overflow-y: auto; padding: 0 2px 2px 2px; flex: 1; align-content: start;
  }
  .regia-scene-card {
    position: relative; cursor: pointer; border-radius: 4px; overflow: hidden;
    border: 1px solid var(--border-subtle); background: var(--bg-card);
    transition: all 0.22s ease; display: flex; flex-direction: column;
    height: 130px;
  }
  .regia-scene-card:hover { border-color: var(--border-gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .regia-scene-card.active { border-color: var(--gold); box-shadow: 0 0 16px rgba(201,165,92,0.25); }
  .regia-scene-img-wrap {
    flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, var(--bg-card-elevated), var(--bg-card));
    position: relative; min-height: 0;
  }
  .regia-scene-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
  .regia-scene-card:hover .regia-scene-img-wrap img { transform: scale(1.06); }
  .regia-scene-ph { font-size: 1.6rem; line-height: 1; }
  .regia-scene-footer {
    flex-shrink: 0; padding: 0.3rem 0.4rem;
    background: rgba(10,8,7,0.88);
    border-top: 1px solid var(--border-subtle);
  }
  .regia-scene-name {
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    color: var(--text-strong); line-height: 1.25; text-align: center;
    text-transform: uppercase; letter-spacing: 0.06em;
    white-space: normal; word-break: break-word;
  }
  .regia-scene-playing-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
    display: inline-block; margin-right: 4px; animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  .regia-card-actions {
    position: absolute; top: 4px; right: 4px; display: flex; gap: 3px; opacity: 0; transition: opacity 0.18s;
  }
  .regia-scene-card:hover .regia-card-actions { opacity: 1; }
  .btn-scene-img, .btn-scene-url {
    background: rgba(10,8,7,0.8); border: 1px solid var(--border-soft);
    color: var(--text-muted); cursor: pointer; padding: 0.18rem 0.3rem;
    border-radius: 2px; font-size: 9px; flex-shrink: 0;
    transition: all 0.15s; white-space: nowrap; backdrop-filter: blur(2px);
  }
  .btn-scene-img:hover { color: var(--gold); border-color: var(--border-gold); }
  .btn-scene-url:hover { color: #a0c8f0; border-color: rgba(100,160,220,0.5); }

  /* ---- VISTA DETTAGLIO SCENA ---- */
  .regia-detail-view { display: flex; flex-direction: column; flex: 1; min-height: 0; position: relative; }
  .regia-detail-bg {
    position: absolute; inset: 0; background-size: cover; background-position: center;
    opacity: 0.12; filter: blur(1px); pointer-events: none; z-index: 0;
  }
  .regia-detail-content { position: relative; z-index: 1; display: flex; flex-direction: column; flex: 1; gap: 0.6rem; }
  .regia-back-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    background: transparent; border: 1px solid var(--border-subtle);
    color: var(--text-muted); cursor: pointer; padding: 0.3rem 0.55rem;
    border-radius: 3px; font-family: 'Cinzel', serif; font-size: 8.5px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    transition: all 0.18s; align-self: flex-start;
  }
  .regia-back-btn:hover { color: var(--gold); border-color: var(--border-gold); }
  .regia-detail-title {
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold-bright);
    text-align: center; line-height: 1.2;
  }

  /* ---- GRADE BTNS — più piccoli ---- */
  .regia-grade-btns {
    display: flex; gap: 0.25rem; background: var(--bg-card); border-radius: 3px;
    padding: 0.2rem; border: 1px solid var(--border-subtle);
  }
  .btn-grade {
    flex: 1; padding: 0.22rem 0; border-radius: 2px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid;
    display: flex; align-items: center; justify-content: center; gap: 0.2rem;
    transition: all 0.18s ease;
  }
  .btn-grade-off { background: transparent; color: var(--text-faint); border-color: transparent; }
  .btn-grade-off:hover { color: var(--text-muted); border-color: var(--border-subtle); }
  .btn-grade-on { background: transparent; color: var(--gold-dim); border-color: transparent; }
  .btn-grade-on:hover { color: var(--gold-bright); border-color: var(--border-soft); }
  .btn-grade-active { background: linear-gradient(180deg,#c9a55c,#8b6f3f); color: #1a1208; border-color: #6b4f23; box-shadow: 0 2px 8px rgba(201,165,92,0.3); }

  /* ---- SFX & ONE-SHOT — più grandi e visibili ---- */
  .regia-sfx-grid { display: flex; flex-direction: column; gap: 0.4rem; }
  .regia-sfx-row { display: flex; align-items: center; gap: 0.4rem; }
  .regia-sfx-name {
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
    width: 56px; flex-shrink: 0;
  }
  .regia-sfx-btns { display: flex; gap: 0.2rem; flex: 1; }
  .btn-sfx-grade {
    flex: 1; padding: 0.35rem 0; border-radius: 3px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 700;
    border: 1px solid; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .btn-sfx-off { background: var(--bg-card); color: var(--text-faint); border-color: var(--border-subtle); }
  .btn-sfx-on  { background: rgba(100,150,80,0.12); color: #a0c878; border-color: rgba(100,150,80,0.4); }
  .btn-sfx-active { background: rgba(100,150,80,0.3); color: #c8e890; border-color: rgba(100,180,80,0.6); box-shadow: 0 0 6px rgba(100,200,80,0.2); }
  .regia-oneshot-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .btn-oneshot {
    flex: 1; min-width: 0; padding: 0.6rem 0.5rem; border-radius: 4px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; border: 1px solid; text-align: center;
    transition: all 0.18s ease; display: flex; align-items: center; justify-content: center; gap: 0.3rem;
  }
  .btn-oneshot-thunder { background: rgba(80,80,200,0.15); color: #a0a8f0; border-color: rgba(80,80,200,0.5); }
  .btn-oneshot-thunder:hover { background: rgba(80,80,200,0.28); box-shadow: 0 4px 12px rgba(80,80,200,0.25); }
  .btn-oneshot-bell { background: rgba(201,165,92,0.13); color: var(--gold); border-color: var(--border-gold); }
  .btn-oneshot-bell:hover { background: rgba(201,165,92,0.25); box-shadow: 0 4px 12px rgba(201,165,92,0.2); }
  .btn-oneshot-bard { background: rgba(180,80,180,0.15); color: #e0a0e0; border-color: rgba(180,80,180,0.5); }
  .btn-oneshot-bard:hover { background: rgba(180,80,180,0.28); box-shadow: 0 4px 12px rgba(180,80,180,0.25); }
  /* Modale modifica immagine scena */
  .regia-img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .regia-img-box {
    background: var(--bg-card-elevated); border: 1px solid var(--border-gold);
    border-radius: 6px; padding: 1.25rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .regia-img-box-title {
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--gold-bright);
  }
  .regia-img-box input[type="text"] {
    background: var(--bg-card); border: 1px solid var(--border-soft);
    color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 13px;
    padding: 0.5rem 0.75rem; border-radius: 3px; outline: none; width: 100%;
  }
  .regia-img-box input[type="text"]:focus { border-color: var(--border-gold); }
  .regia-img-box input[type="file"] {
    font-family: 'EB Garamond', serif; font-size: 12px; color: var(--text-muted);
    background: var(--bg-card); border: 1px dashed var(--border-soft);
    padding: 0.4rem 0.6rem; border-radius: 3px; cursor: pointer; width: 100%;
  }
  .regia-img-preview {
    width: 100%; height: 120px; border-radius: 3px; object-fit: cover;
    border: 1px solid var(--border-soft); display: block;
  }
  .regia-img-btn-row { display: flex; gap: 0.5rem; }
  .btn-regia-save {
    flex: 1; padding: 0.45rem; background: linear-gradient(180deg,#f0d490,#c9a55c 45%,#a8843e);
    color: #1a1208; border: 1px solid #6b4f23; border-radius: 3px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; transition: all 0.2s;
  }
  .btn-regia-save:hover { filter: brightness(1.1); }
  .btn-regia-cancel {
    flex: 1; padding: 0.45rem; background: var(--bg-card);
    color: var(--text-muted); border: 1px solid var(--border-soft); border-radius: 3px;
    cursor: pointer; font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.2s;
  }
  .btn-regia-cancel:hover { color: var(--text-main); border-color: var(--border-gold); }
  /* ===== TIMER ===== */
  .dm-timer-wrap {
    margin-top: 1rem;
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 4px; padding: 0.85rem 1rem;
    display: flex; flex-direction: column; gap: 0.6rem;
  }
  .dm-timer-title {
    font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--gold-dim);
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.3rem;
  }
  .dm-timer-display {

  .category-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border: 1px solid;
  }
  .cat-pg { background: rgba(102,136,204,0.28); color: #b8d0f0; border-color: rgba(102,136,204,0.65); }
  .cat-boss { background: rgba(168,56,56,0.35); color: #ffc0c0; border-color: rgba(168,56,56,0.75); }
  .cat-npc { background: rgba(168,168,184,0.22); color: #e0e0ee; border-color: rgba(168,168,184,0.6); }
  .cat-sgherri { background: rgba(122,138,58,0.28); color: #d8e090; border-color: rgba(122,138,58,0.65); }

  .category-select {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);

    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .combatant-header { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .combatant-init {
    width: 48px; height: 48px;

    border: 2px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .combatant-init input {
    width: 100%; height: 100%;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    color: var(--gold-bright);
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 18px;
  }
  .combatant-name-input {
    flex: 1;
    min-width: 150px;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border-soft);
    color: var(--text-strong);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    padding: 0.4rem 0.2rem;
    outline: none;
  }
  .combatant-name-input:focus { border-bottom-color: var(--gold); }
  .hp-control { display: inline-flex; align-items: center; gap: 6px; font-family: 'Cinzel', serif; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .hp-control input {
    width: 56px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--gold-bright);
    border-radius: 2px;
    padding: 3px 6px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    text-align: center;
  }
  .row-delete {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-faint);
    width: 28px; height: 28px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .row-delete:hover { border-color: var(--blood); color: #ff9c9c; background: rgba(138,36,36,0.15); }

  .active-conditions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.65rem; }
  .condition-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid;
  }
  .condition-badge button { background: transparent; border: none; color: inherit; cursor: pointer; opacity: 0.7; padding: 0; display: inline-flex; }

  /* =========================================================
     CONDIZIONI — Effetti layered (overlay CSS seri, niente emoji)
     ========================================================= */

  /* Overlay assoluti standard: pseudo-elementi non visibili di default,
     attivati dalle classi cond-*. Si combinano con stacking ordinato. */
  .combatant-card.has-conditions { isolation: isolate; }
  .combatant-card.has-conditions > .combatant-header,
  .combatant-card.has-conditions > .active-conditions { position: relative; z-index: 2; }

  /* Layer fx generico: copre l'intera card senza intercettare i click */
  .fx-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    overflow: hidden;
    z-index: 0;
  }

  /* ============================================================
     ACCECATO — Vignette nera profonda + centro sfocato
     ============================================================ */
  .cond-accecato {
    border-color: rgba(0,0,0,0.7) !important;
    background: linear-gradient(165deg, rgba(5,5,5,0.92), rgba(15,12,10,0.92)) !important;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.95),
      0 0 0 1px rgba(0,0,0,0.6),
      var(--shadow-card) !important;
  }
  .fx-blind {
    background:
      radial-gradient(ellipse at 50% 50%, transparent 0%, transparent 25%, rgba(0,0,0,0.92) 75%, #000 100%);
    backdrop-filter: blur(2px);
  }
  .fx-blind::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 35%;
    height: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(40,40,50,0.4) 0%, transparent 70%);
    filter: blur(8px);
    animation: blind-breathe 4s ease-in-out infinite;
  }
  @keyframes blind-breathe {
    0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* ============================================================
     AFFASCINATO — Cuori rosa che fluttuano + glow rosato
     ============================================================ */
  .cond-affascinato {
    border-color: rgba(255,140,200,0.75) !important;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(255,140,200,0.28) 0%, transparent 60%),
      linear-gradient(165deg, rgba(110,40,80,0.4), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 36px rgba(255,140,200,0.3),
      0 0 24px rgba(255,140,200,0.4),
      var(--shadow-card) !important;
  }
  .fx-charm {
    overflow: hidden;
  }
  .fx-charm .heart {
    position: absolute;
    bottom: -20px;
    width: 14px;
    height: 14px;
    color: #ff8fc8;
    filter: drop-shadow(0 0 6px rgba(255,140,200,0.9));
    animation: heart-rise 4.5s ease-in infinite;
  }
  .fx-charm .heart::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, currentColor 0%, currentColor 28%, transparent 35%),
      radial-gradient(circle at 70% 30%, currentColor 0%, currentColor 28%, transparent 35%);
  }
  .fx-charm .heart::after {
    content: '';
    position: absolute;
    top: 30%; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 60%;
    height: 60%;
    background: currentColor;
    border-radius: 0 0 2px 0;
  }
  .fx-charm .heart:nth-child(1) { left: 8%; animation-delay: 0s; }
  .fx-charm .heart:nth-child(2) { left: 22%; animation-delay: 0.7s; width: 11px; height: 11px; }
  .fx-charm .heart:nth-child(3) { left: 38%; animation-delay: 1.4s; }
  .fx-charm .heart:nth-child(4) { left: 55%; animation-delay: 2.1s; width: 16px; height: 16px; }
  .fx-charm .heart:nth-child(5) { left: 72%; animation-delay: 0.3s; width: 12px; height: 12px; }
  .fx-charm .heart:nth-child(6) { left: 86%; animation-delay: 1.0s; }
  @keyframes heart-rise {
    0% { bottom: -20px; opacity: 0; transform: translateX(0) scale(0.6); }
    15% { opacity: 1; transform: scale(1); }
    50% { transform: translateX(8px) scale(1.05); }
    85% { opacity: 1; }
    100% { bottom: 110%; opacity: 0; transform: translateX(-6px) scale(0.5); }
  }

  /* ============================================================
     AFFERRATO — Catene/braccia d'ombra che spuntano dai bordi
     ============================================================ */
  .cond-afferrato {
    border-color: rgba(40,30,25,0.85) !important;
    background:
      linear-gradient(165deg, rgba(30,20,15,0.55), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 28px rgba(0,0,0,0.6),
      0 0 0 1px rgba(60,40,30,0.7),
      var(--shadow-card) !important;
  }
  .fx-grappled {
    overflow: visible;
  }
  /* 4 catene SVG: top-left, top-right, bottom-left, bottom-right */
  .fx-grappled .chain {
    position: absolute;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 80'><g fill='none' stroke='%23080604' stroke-width='2.2' opacity='0.95'><ellipse cx='10' cy='6' rx='6' ry='3'/><ellipse cx='10' cy='12' rx='3' ry='6'/><ellipse cx='10' cy='22' rx='6' ry='3'/><ellipse cx='10' cy='28' rx='3' ry='6'/><ellipse cx='10' cy='38' rx='6' ry='3'/><ellipse cx='10' cy='44' rx='3' ry='6'/><ellipse cx='10' cy='54' rx='6' ry='3'/><ellipse cx='10' cy='60' rx='3' ry='6'/><ellipse cx='10' cy='70' rx='6' ry='3'/></g><g fill='none' stroke='%23303030' stroke-width='0.7'><ellipse cx='10' cy='6' rx='6' ry='3'/><ellipse cx='10' cy='22' rx='6' ry='3'/><ellipse cx='10' cy='38' rx='6' ry='3'/><ellipse cx='10' cy='54' rx='6' ry='3'/><ellipse cx='10' cy='70' rx='6' ry='3'/></g></svg>");
    background-repeat: no-repeat;
    background-size: contain;
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.9));
    animation: chain-tense 2.5s ease-in-out infinite;
  }
  .fx-grappled .chain.tl { top: -8px; left: 10%; width: 14px; height: 44px; transform: rotate(-25deg); transform-origin: top center; }
  .fx-grappled .chain.tr { top: -8px; right: 10%; width: 14px; height: 44px; transform: rotate(25deg); transform-origin: top center; }
  .fx-grappled .chain.bl { bottom: -8px; left: 18%; width: 14px; height: 44px; transform: rotate(-155deg); transform-origin: top center; }
  .fx-grappled .chain.br { bottom: -8px; right: 18%; width: 14px; height: 44px; transform: rotate(155deg); transform-origin: top center; }
  @keyframes chain-tense {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(0,0,0,0.9)); }
    50% { filter: drop-shadow(0 0 6px rgba(60,30,10,0.95)) brightness(1.2); }
  }

  /* ============================================================
     ASSORDATO — Glitch + sdoppiamento cromatico
     ============================================================ */
  .cond-assordato {
    border-color: rgba(120,140,200,0.6) !important;
    background: linear-gradient(165deg, rgba(45,55,75,0.55), var(--bg-card)) !important;
    filter: saturate(0.5);
    box-shadow:
      inset 0 0 24px rgba(40,50,70,0.45),
      0 0 0 1px rgba(120,140,200,0.45),
      var(--shadow-card) !important;
  }
  .fx-deaf {
    overflow: hidden;
  }
  /* Bande di interferenza orizzontali */
  .fx-deaf::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0px, transparent 3px,
        rgba(255,80,120,0.05) 3px, rgba(255,80,120,0.05) 4px,
        transparent 4px, transparent 7px,
        rgba(80,200,255,0.05) 7px, rgba(80,200,255,0.05) 8px);
    animation: deaf-scan 4s linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes deaf-scan {
    from { transform: translateY(0); }
    to { transform: translateY(-50%); }
  }
  /* Glitch bar che attraversa ogni tanto */
  .fx-deaf::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 8px;
    background: linear-gradient(180deg, transparent, rgba(255,60,120,0.3), rgba(60,180,255,0.3), transparent);
    animation: glitch-bar 5s infinite;
    opacity: 0;
  }
  @keyframes glitch-bar {
    0%, 8%, 100% { opacity: 0; top: 20%; }
    9% { opacity: 1; top: 30%; }
    11% { opacity: 1; top: 50%; }
    13% { opacity: 0; top: 70%; }
    50% { opacity: 0; }
    52% { opacity: 1; top: 25%; }
    54% { opacity: 1; top: 60%; }
    56% { opacity: 0; top: 75%; }
  }
  /* Sdoppiamento cromatico del testo della card */
  .cond-assordato .combatant-name-input {
    text-shadow:
      -1.5px 0 rgba(255,60,120,0.7),
      1.5px 0 rgba(60,200,255,0.7);
    animation: chromatic-glitch 3s steps(8) infinite;
  }
  @keyframes chromatic-glitch {
    0%, 92%, 100% { text-shadow: -1.5px 0 rgba(255,60,120,0.7), 1.5px 0 rgba(60,200,255,0.7); }
    94% { text-shadow: -3px 0 rgba(255,60,120,0.9), 3px 0 rgba(60,200,255,0.9); transform: translateX(-1px); }
    96% { text-shadow: 2px 0 rgba(255,60,120,0.9), -2px 0 rgba(60,200,255,0.9); transform: translateX(2px); }
  }

  /* ============================================================
     AVVELENATO — Bollicine verde acido + fumo tossico denso alla base
     ============================================================ */
  .cond-avvelenato {
    border-color: rgba(80,180,80,0.7) !important;
    box-shadow:
      inset 0 -50px 70px -25px rgba(40,110,40,0.6),
      0 0 0 1px rgba(80,180,80,0.5),
      0 0 28px rgba(60,170,60,0.25),
      var(--shadow-card) !important;
    background:
      radial-gradient(ellipse at 50% 130%, rgba(80,220,80,0.3) 0%, transparent 55%),
      linear-gradient(165deg, rgba(30,55,30,0.55), var(--bg-card)) !important;
  }
  /* Layer fumo tossico denso alla base */
  .fx-poison {
    overflow: hidden;
  }
  .fx-poison::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    height: 60%;
    background:
      radial-gradient(ellipse at 20% 100%, rgba(130,220,130,0.55) 0%, transparent 50%),
      radial-gradient(ellipse at 55% 100%, rgba(90,200,90,0.65) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 100%, rgba(140,240,140,0.5) 0%, transparent 50%);
    filter: blur(10px);
    mix-blend-mode: screen;
    animation: poison-fume 6s ease-in-out infinite;
  }
  @keyframes poison-fume {
    0%, 100% { transform: translateX(0) scaleY(1); opacity: 0.85; }
    33% { transform: translateX(10px) scaleY(1.1); opacity: 1; }
    66% { transform: translateX(-8px) scaleY(0.95); opacity: 0.9; }
  }
  /* Bollicine verdi acide */
  .fx-poison .bubble {
    position: absolute;
    bottom: -8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ddffaa 0%, #88dd44 50%, rgba(70,180,40,0.7) 100%);
    box-shadow: 0 0 8px rgba(140,240,140,0.8);
    animation: bubble-rise 4s ease-in infinite;
  }
  .fx-poison .bubble:nth-child(1) { left: 12%; animation-delay: 0s; }
  .fx-poison .bubble:nth-child(2) { left: 28%; animation-delay: 0.8s; width: 6px; height: 6px; }
  .fx-poison .bubble:nth-child(3) { left: 45%; animation-delay: 1.6s; width: 10px; height: 10px; }
  .fx-poison .bubble:nth-child(4) { left: 62%; animation-delay: 0.4s; }
  .fx-poison .bubble:nth-child(5) { left: 78%; animation-delay: 1.2s; width: 7px; height: 7px; }
  .fx-poison .bubble:nth-child(6) { left: 90%; animation-delay: 2.0s; }
  @keyframes bubble-rise {
    0% { bottom: -8px; opacity: 0; transform: scale(0.4); }
    15% { opacity: 1; transform: scale(1); }
    100% { bottom: 105%; opacity: 0; transform: scale(0.6) translateX(8px); }
  }

  /* ============================================================
     INCAPACITATO — Desaturazione + cenere
     ============================================================ */
  .cond-incapacitato {
    border-color: rgba(120,120,120,0.65) !important;
    background: linear-gradient(165deg, rgba(50,50,50,0.55), var(--bg-card)) !important;
    filter: saturate(0.15) brightness(0.75);
    opacity: 0.8;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), var(--shadow-card) !important;
  }
  .fx-incap {
    overflow: hidden;
  }
  .fx-incap .ash {
    position: absolute;
    top: -10px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(180,180,180,0.6);
    animation: ash-fall 5s linear infinite;
  }
  .fx-incap .ash:nth-child(1) { left: 10%; animation-delay: 0s; }
  .fx-incap .ash:nth-child(2) { left: 25%; animation-delay: 1s; width: 2px; height: 2px; }
  .fx-incap .ash:nth-child(3) { left: 40%; animation-delay: 2s; }
  .fx-incap .ash:nth-child(4) { left: 55%; animation-delay: 0.5s; }
  .fx-incap .ash:nth-child(5) { left: 70%; animation-delay: 1.5s; width: 4px; height: 4px; }
  .fx-incap .ash:nth-child(6) { left: 85%; animation-delay: 2.5s; }
  .fx-incap .ash:nth-child(7) { left: 18%; animation-delay: 3s; width: 2px; height: 2px; }
  .fx-incap .ash:nth-child(8) { left: 60%; animation-delay: 3.5s; }
  @keyframes ash-fall {
    0% { top: -10px; opacity: 0; transform: translateX(0); }
    10% { opacity: 0.6; }
    100% { top: 110%; opacity: 0; transform: translateX(12px); }
  }

  /* ============================================================
     INVISIBILE — Opacità 15%, bordo ciano dashed, distorsione rifrazione
     ============================================================ */
  .cond-invisibile {
    border: 2px dashed rgba(140,230,255,0.7) !important;
    background:
      radial-gradient(ellipse at center, rgba(140,230,255,0.05) 0%, transparent 70%),
      linear-gradient(165deg, rgba(40,60,80,0.2), rgba(30,40,60,0.15)) !important;
    opacity: 0.18;
    box-shadow:
      inset 0 0 32px rgba(140,230,255,0.15),
      0 0 16px rgba(140,230,255,0.3),
      var(--shadow-card) !important;
    backdrop-filter: blur(2.5px);
    animation: invisible-pulse 3s ease-in-out infinite;
  }
  .cond-invisibile:hover { opacity: 0.7; }
  @keyframes invisible-pulse {
    0%, 100% { opacity: 0.15; border-color: rgba(140,230,255,0.6); }
    50% { opacity: 0.3; border-color: rgba(180,240,255,0.95); }
  }
  /* Effetto rifrazione (linee orizzontali distorte) */
  .fx-invisible {
    overflow: hidden;
    mix-blend-mode: screen;
  }
  .fx-invisible::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0px, transparent 5px,
        rgba(180,240,255,0.08) 5px, rgba(180,240,255,0.08) 6px);
    animation: refraction-wave 3s ease-in-out infinite;
  }
  @keyframes refraction-wave {
    0%, 100% { transform: skewX(0deg) translateY(0); }
    25% { transform: skewX(3deg) translateY(-2px); }
    75% { transform: skewX(-3deg) translateY(2px); }
  }

  /* ============================================================
     PARALIZZATO — Scariche elettriche blu + sovraesposizione
     ============================================================ */
  .cond-paralizzato {
    border-color: rgba(140,210,255,0.85) !important;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(100,200,255,0.25) 0%, transparent 60%),
      linear-gradient(165deg, rgba(25,65,110,0.5), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 30px rgba(100,200,255,0.4),
      0 0 0 1px rgba(140,210,255,0.7),
      0 0 36px rgba(80,180,240,0.5),
      var(--shadow-card) !important;
    filter: brightness(1.18) saturate(1.15);
    animation: paralizz-overexpose 2.4s steps(8) infinite;
  }
  @keyframes paralizz-overexpose {
    0%, 88%, 100% { filter: brightness(1.18) saturate(1.15); }
    90% { filter: brightness(1.45) saturate(1.4) contrast(1.2); }
    92% { filter: brightness(0.95); }
    94% { filter: brightness(1.5) saturate(1.5); }
  }
  /* Scariche elettriche tra i bordi */
  .fx-paralyzed {
    overflow: hidden;
  }
  .fx-paralyzed .bolt {
    position: absolute;
    background: linear-gradient(90deg, transparent, #aaddff 40%, #ffffff 50%, #aaddff 60%, transparent);
    box-shadow: 0 0 8px #88ccff, 0 0 16px rgba(140,220,255,0.85);
    opacity: 0;
    animation: bolt-flash 2.5s ease-out infinite;
  }
  .fx-paralyzed .bolt.top { top: 0; left: 5%; right: 5%; height: 2px; animation-delay: 0s; }
  .fx-paralyzed .bolt.bottom { bottom: 0; left: 5%; right: 5%; height: 2px; animation-delay: 0.8s; }
  .fx-paralyzed .bolt.left { left: 0; top: 5%; bottom: 5%; width: 2px;
    background: linear-gradient(180deg, transparent, #aaddff 40%, #ffffff 50%, #aaddff 60%, transparent); animation-delay: 0.4s; }
  .fx-paralyzed .bolt.right { right: 0; top: 5%; bottom: 5%; width: 2px;
    background: linear-gradient(180deg, transparent, #aaddff 40%, #ffffff 50%, #aaddff 60%, transparent); animation-delay: 1.2s; }
  @keyframes bolt-flash {
    0%, 4%, 100% { opacity: 0; }
    5% { opacity: 1; }
    8% { opacity: 0.3; }
    10% { opacity: 1; }
    14% { opacity: 0; }
  }

  /* ============================================================
     PIETRIFICATO — Grayscale + texture pietra + crepe che si espandono
     ============================================================ */
  .cond-pietrificato {
    border-color: rgba(150,150,150,0.75) !important;
    background:
      linear-gradient(135deg, rgba(110,110,110,0.55) 0%, rgba(65,65,65,0.55) 100%),
      var(--bg-card) !important;
    filter: grayscale(1) contrast(1.2) brightness(0.78);
    box-shadow:
      inset 0 0 32px rgba(0,0,0,0.6),
      0 0 0 1px rgba(150,150,150,0.6),
      var(--shadow-card) !important;
  }
  .fx-stone {
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='100'><filter id='n'><feTurbulence baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.2 0 0 0 0 0.2 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
      linear-gradient(115deg, transparent 0 49.6%, rgba(20,20,20,0.6) 49.7%, transparent 50.5%),
      linear-gradient(64deg, transparent 0 67.6%, rgba(10,10,10,0.5) 67.7%, transparent 68.5%);
    background-size: 200px 100px, 100% 100%, 100% 100%;
    mix-blend-mode: multiply;
    opacity: 0.9;
  }
  /* Crepe nere che si espandono progressivamente */
  .fx-stone-cracks {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 100' preserveAspectRatio='none'><g fill='none' stroke='%23000' stroke-width='1.5' stroke-linecap='round'><path d='M 30 0 L 35 20 L 22 35 L 38 55 L 28 80 L 42 100'/><path d='M 35 20 L 60 22 L 75 45 L 90 38 L 110 55'/><path d='M 22 35 L 5 42 L 12 65 L 0 78'/><path d='M 38 55 L 65 60 L 80 75'/><path d='M 180 0 L 195 25 L 175 50 L 200 78 L 185 100'/><path d='M 195 25 L 225 30 L 240 55'/><path d='M 175 50 L 150 58 L 162 80'/><path d='M 340 0 L 358 22 L 340 48 L 365 72 L 348 100'/><path d='M 358 22 L 388 28 L 400 52'/><path d='M 340 48 L 315 55 L 325 78'/></g><g fill='none' stroke='%23000' stroke-width='0.5' opacity='0.6'><path d='M 60 22 L 80 30 L 95 22'/><path d='M 225 30 L 248 38 L 260 28'/><path d='M 388 28 L 400 38 L 388 50'/></g></svg>");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    opacity: 0;
    animation: cracks-spread 2s ease-out forwards;
    z-index: 2;
  }
  @keyframes cracks-spread {
    0% { opacity: 0; transform: scale(0.85); filter: brightness(1.5); }
    100% { opacity: 0.95; transform: scale(1); filter: brightness(1); }
  }

  /* ============================================================
     PRIVO DI SENSI — Luminosità calata + battito cardiaco rosso
     ============================================================ */
  .cond-priv-di-sensi {
    border-color: rgba(60,40,60,0.7) !important;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(10,5,15,0.75) 90%),
      linear-gradient(165deg, rgba(25,15,30,0.65), var(--bg-card)) !important;
    filter: brightness(0.45) saturate(0.4);
    box-shadow:
      inset 0 0 50px rgba(10,5,15,0.8),
      0 0 0 1px rgba(60,40,60,0.55),
      var(--shadow-card) !important;
    animation: heartbeat-card 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat-card {
    0%, 100% { box-shadow: inset 0 0 50px rgba(10,5,15,0.8), 0 0 0 1px rgba(140,30,30,0.4), 0 0 12px rgba(140,30,30,0.2), var(--shadow-card); }
    15% { box-shadow: inset 0 0 50px rgba(10,5,15,0.8), 0 0 0 2px rgba(220,40,40,0.85), 0 0 28px rgba(220,40,40,0.6), var(--shadow-card); }
    25% { box-shadow: inset 0 0 50px rgba(10,5,15,0.8), 0 0 0 1px rgba(140,30,30,0.4), 0 0 12px rgba(140,30,30,0.2), var(--shadow-card); }
    35% { box-shadow: inset 0 0 50px rgba(10,5,15,0.8), 0 0 0 2px rgba(220,40,40,0.85), 0 0 28px rgba(220,40,40,0.6), var(--shadow-card); }
    50% { box-shadow: inset 0 0 50px rgba(10,5,15,0.8), 0 0 0 1px rgba(140,30,30,0.4), 0 0 12px rgba(140,30,30,0.2), var(--shadow-card); }
  }
  .fx-unconscious {
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(40,0,0,0.4) 100%);
  }

  /* ============================================================
     PRONO — Prospettiva 3D verso il basso + cuori Hardcore sopra il nome
     ============================================================ */
  .cond-prono {
    border-color: rgba(160,120,72,0.7) !important;
    background:
      linear-gradient(180deg, rgba(60,40,20,0.5) 0%, transparent 30%),
      linear-gradient(165deg, rgba(80,55,30,0.4), var(--bg-card)) !important;
    box-shadow:
      inset 0 18px 30px -10px rgba(0,0,0,0.6),
      0 0 0 1px rgba(160,120,72,0.55),
      var(--shadow-card) !important;
    transform: perspective(600px) rotateX(15deg);
    transform-origin: bottom center;
  }
  /* Cuori Minecraft Hardcore (faccia cattiva) sopra il nome */
  .fx-prone-hearts {
    overflow: visible;
    z-index: 5;
  }
  .fx-prone-hearts .mc-heart {
    position: absolute;
    top: 4px;
    width: 22px;
    height: 22px;
    animation: mc-heart-beat 0.8s ease-in-out infinite;
  }
  .fx-prone-hearts .mc-heart:nth-child(1) { left: calc(50% - 36px); animation-delay: 0s; }
  .fx-prone-hearts .mc-heart:nth-child(2) { left: calc(50% - 11px); animation-delay: 0.13s; }
  .fx-prone-hearts .mc-heart:nth-child(3) { left: calc(50% + 14px); animation-delay: 0.26s; }
  @keyframes mc-heart-beat {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(180,30,30,0.7)); }
    50% { transform: scale(1.18); filter: drop-shadow(0 0 8px rgba(220,40,40,1)); }
  }

  /* ============================================================
     SPAVENTATO — Aura viola pulsante + jitter + ombre spettrali
     ============================================================ */
  .cond-spaventato {
    border-color: rgba(170,100,220,0.75) !important;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(50,20,80,0.65) 100%),
      linear-gradient(165deg, rgba(55,30,90,0.5), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 44px rgba(80,30,140,0.45),
      0 0 0 1px rgba(170,100,220,0.6),
      0 0 32px rgba(157,95,200,0.45),
      var(--shadow-card) !important;
    animation: spavent-jitter 0.18s steps(3) infinite, spavent-aura 2.6s ease-in-out infinite;
  }
  @keyframes spavent-jitter {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(-1px, 1px); }
    66% { transform: translate(1px, -1px); }
  }
  @keyframes spavent-aura {
    0%, 100% { box-shadow: inset 0 0 44px rgba(80,30,140,0.45), 0 0 0 1px rgba(170,100,220,0.6), 0 0 32px rgba(157,95,200,0.45), var(--shadow-card); }
    50% { box-shadow: inset 0 0 60px rgba(120,40,180,0.7), 0 0 0 2px rgba(200,130,255,0.9), 0 0 48px rgba(180,100,240,0.8), var(--shadow-card); }
  }
  /* Ombre spettrali fluttuanti */
  .fx-fear {
    overflow: hidden;
  }
  .fx-fear .ghost {
    position: absolute;
    width: 30px;
    height: 40px;
    background: radial-gradient(ellipse at 50% 30%, rgba(180,120,220,0.55) 0%, rgba(80,30,120,0.4) 50%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(3px);
    animation: ghost-drift 6s ease-in-out infinite;
  }
  .fx-fear .ghost:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .fx-fear .ghost:nth-child(2) { top: 50%; right: 5%; animation-delay: 1.8s; }
  .fx-fear .ghost:nth-child(3) { top: 25%; right: 25%; animation-delay: 3.5s; width: 24px; height: 32px; }
  @keyframes ghost-drift {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.55; }
    25% { transform: translate(10px, -8px) scale(1.1); opacity: 0.8; }
    50% { transform: translate(-6px, 6px) scale(0.95); opacity: 0.7; }
    75% { transform: translate(8px, 4px) scale(1.05); opacity: 0.85; }
  }

  /* ============================================================
     STORDITO — Scintille dorate orbitanti + ghosting sfasato
     ============================================================ */
  .cond-stordito {
    border-color: rgba(255,210,90,0.75) !important;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255,210,90,0.18) 0%, transparent 60%),
      linear-gradient(165deg, rgba(95,75,25,0.45), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 30px rgba(255,210,90,0.3),
      0 0 0 1px rgba(255,210,90,0.6),
      0 0 28px rgba(232,200,79,0.45),
      var(--shadow-card) !important;
  }
  /* Ghosting cromatico del nome */
  .cond-stordito .combatant-name-input {
    text-shadow:
      2px 0 rgba(255,210,90,0.5),
      -2px 0 rgba(255,150,40,0.5),
      0 2px rgba(255,255,200,0.3);
    animation: stun-ghost 1.8s ease-in-out infinite;
  }
  @keyframes stun-ghost {
    0%, 100% { text-shadow: 2px 0 rgba(255,210,90,0.5), -2px 0 rgba(255,150,40,0.5), 0 2px rgba(255,255,200,0.3); }
    50% { text-shadow: 4px 0 rgba(255,210,90,0.8), -4px 0 rgba(255,150,40,0.8), 0 3px rgba(255,255,200,0.5); }
  }
  /* Scintille orbitanti sopra */
  .fx-stunned {
    overflow: visible;
  }
  .fx-stunned .spark-orbit {
    position: absolute;
    top: 2px;
    left: 50%;
    width: 60px;
    height: 18px;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .fx-stunned .spark-orbit::before,
  .fx-stunned .spark-orbit::after {
    content: '';
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff8c8 0%, #ffd040 50%, transparent 100%);
    box-shadow: 0 0 6px #ffd040, 0 0 12px rgba(255,200,80,0.8);
    top: 50%;
    left: 50%;
    animation: spark-orbit 1.5s linear infinite;
  }
  .fx-stunned .spark-orbit::after { animation-delay: 0.5s; }
  @keyframes spark-orbit {
    0% { transform: translate(-50%, -50%) rotate(0deg) translateX(24px) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(180deg) translateX(24px) scale(0.7); }
    100% { transform: translate(-50%, -50%) rotate(360deg) translateX(24px) scale(1); }
  }
  .fx-stunned .spark-orbit .extra-spark {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff8c8 0%, #ffaa30 60%, transparent 100%);
    box-shadow: 0 0 5px #ffaa30;
    top: 50%;
    left: 50%;
    animation: spark-orbit 1.5s linear infinite;
    animation-delay: 1s;
  }

  /* ============================================================
     TRATTENUTO — Ragnatele/radici che ancorano agli angoli
     ============================================================ */
  .cond-trattenuto {
    border-color: rgba(140,110,80,0.7) !important;
    background:
      repeating-linear-gradient(45deg, transparent 0 12px, rgba(200,180,150,0.06) 12px 13px),
      repeating-linear-gradient(-45deg, transparent 0 12px, rgba(200,180,150,0.06) 12px 13px),
      linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card)) !important;
    box-shadow:
      inset 0 0 28px rgba(80,60,40,0.35),
      0 0 0 1px rgba(140,110,80,0.55),
      var(--shadow-card) !important;
  }
  /* Ragnatele/radici negli angoli — 4 elementi SVG */
  .fx-restrained {
    overflow: hidden;
  }
  .fx-restrained .web {
    position: absolute;
    width: 60px;
    height: 60px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><g fill='none' stroke='%23d8d0c0' stroke-width='0.8' opacity='0.75'><path d='M 0 0 L 60 60'/><path d='M 0 0 L 30 60'/><path d='M 0 0 L 60 30'/><path d='M 0 0 L 60 0'/><path d='M 0 0 L 0 60'/><path d='M 12 12 Q 18 8 24 14 Q 32 8 38 16 Q 30 22 22 18 Q 16 22 12 12 Z'/><path d='M 22 22 Q 30 18 38 26 Q 32 32 28 30 Q 22 32 22 22 Z'/><path d='M 38 38 Q 44 36 48 42 Q 44 46 38 38 Z'/></g></svg>");
    background-size: contain;
    background-repeat: no-repeat;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.6));
    animation: web-shimmer 4s ease-in-out infinite;
  }
  .fx-restrained .web.tl { top: 0; left: 0; }
  .fx-restrained .web.tr { top: 0; right: 0; transform: scaleX(-1); }
  .fx-restrained .web.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .fx-restrained .web.br { bottom: 0; right: 0; transform: scale(-1, -1); }
  @keyframes web-shimmer {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; filter: drop-shadow(0 0 4px rgba(255,255,255,0.4)); }
  }

  /* ============================================================
     INDEBOLITO — Colori sbiaditi + particelle scure che colano
     ============================================================ */
  .cond-indebolito {
    border-color: rgba(140,110,110,0.6) !important;
    background: linear-gradient(165deg, rgba(75,55,55,0.4), var(--bg-card)) !important;
    filter: saturate(0.4) brightness(0.85);
    box-shadow:
      inset 0 0 24px rgba(80,40,40,0.3),
      0 0 0 1px rgba(140,110,110,0.45),
      var(--shadow-card) !important;
  }
  .fx-weakened {
    overflow: hidden;
  }
  /* Particelle scure che colano dal nome verso il basso */
  .fx-weakened .drain {
    position: absolute;
    width: 2px;
    height: 30px;
    background: linear-gradient(180deg, rgba(80,30,30,0.7) 0%, transparent 100%);
    top: 30%;
    border-radius: 0 0 2px 2px;
    animation: drain-fall 3s ease-in infinite;
  }
  .fx-weakened .drain:nth-child(1) { left: 18%; animation-delay: 0s; }
  .fx-weakened .drain:nth-child(2) { left: 32%; animation-delay: 0.6s; height: 25px; }
  .fx-weakened .drain:nth-child(3) { left: 48%; animation-delay: 1.2s; }
  .fx-weakened .drain:nth-child(4) { left: 62%; animation-delay: 0.3s; height: 28px; }
  .fx-weakened .drain:nth-child(5) { left: 78%; animation-delay: 1.0s; }
  .fx-weakened .drain:nth-child(6) { left: 88%; animation-delay: 1.6s; height: 22px; }
  @keyframes drain-fall {
    0% { transform: translateY(0); opacity: 0; height: 0; }
    20% { opacity: 0.8; height: 25px; }
    100% { transform: translateY(60px); opacity: 0; }
  }


  .conditions-panel {
    background: var(--bg-panel-glass);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 1.25rem;
    position: sticky;
    top: 1rem;
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
  }
  .condition-item {
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    background: var(--bg-card);
    margin-bottom: 0.4rem;
    overflow: hidden;
  }
  .condition-item:hover { border-color: var(--border-gold); }
  .condition-item.expanded { border-color: var(--gold); }
  .condition-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.55rem 0.8rem;
    cursor: pointer;
  }
  .condition-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .condition-item.expanded .condition-name { color: var(--gold-bright); }
  .condition-actions { display: flex; gap: 4px; align-items: center; }
  .condition-body { padding: 0.6rem 0.8rem 0.8rem; font-size: 13.5px; color: var(--text-muted); line-height: 1.5; border-top: 1px solid var(--border-subtle); }
  .condition-body p { margin: 0 0 0.4rem; }
  .condition-assign-btn {
    background: linear-gradient(180deg, rgba(201,165,92,0.22), rgba(139,111,63,0.15));
    border: 1px solid var(--border-gold);
    color: var(--gold-bright);
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    cursor: pointer;
  }
  .assign-popover { background: var(--bg-panel); border: 1px solid var(--border-gold); border-radius: 3px; padding: 0.5rem; margin-top: 0.4rem; }
  .popover-title { font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold-dim); margin-bottom: 0.4rem; }
  .target-list { display: flex; flex-direction: column; gap: 3px; max-height: 160px; overflow-y: auto; }
  .target-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    padding: 4px 9px;
    text-align: left;
    cursor: pointer;
  }
  .target-btn:hover { border-color: var(--gold); background: var(--bg-card-elevated); color: var(--gold-bright); }
  .target-btn.has-condition { color: var(--gold); font-style: italic; }

  .round-counter {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.9rem;
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--gold-bright);
  }
  .round-counter .round-num { font-size: 16px; }

  .combatants-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.4rem 0.4rem 0.4rem 0.85rem;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-subtle);
  }
  .toolbar-title { font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold-dim); }
  .toolbar-count { color: var(--gold); font-weight: 700; }

  .add-icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(201,165,92,0.18), rgba(139,111,63,0.08));
    border: 1px solid var(--border-gold);
    color: var(--gold-bright);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .add-icon-btn:hover { transform: scale(1.08) rotate(90deg); box-shadow: 0 0 16px var(--gold-glow); }
  .add-icon-btn svg { width: 16px; height: 16px; }

  .add-combatant-thin {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
    padding: 0.4rem 0.8rem;
    border: 1px dashed var(--border-subtle);
    border-radius: 3px;
    cursor: pointer;
    color: var(--text-faint);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .add-combatant-thin:hover { border-color: var(--border-gold); color: var(--gold); }
  .add-combatant-thin svg { width: 12px; height: 12px; }

  .notes-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    background: var(--bg-panel-glass);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
  }
  .notes-meta {
    font-family: 'Cinzel', serif;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .notes-meta strong { color: var(--gold-bright); font-weight: 700; }
  .notes-meta .dot { width: 4px; height: 4px; background: var(--gold-dim); border-radius: 50%; display: inline-block; }

  .notes-area {
    width: 100%;
    min-height: 65vh;
    background:
      repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(201,165,92,0.08) 31px, rgba(201,165,92,0.08) 32px),
      linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
    background-attachment: local;
    border: 1px solid var(--border-soft);
    border-left: 2px solid rgba(138,36,36,0.35);
    border-radius: 4px;
    color: var(--text-strong);
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    line-height: 32px;
    padding: 1.4rem 1.6rem 1.4rem 4rem;
    resize: vertical;
    outline: none;
    box-shadow: var(--shadow-card);
  }
  .notes-area:focus { border-color: var(--border-gold); box-shadow: 0 0 0 3px var(--gold-glow); }
  .notes-area::placeholder { color: var(--text-faint); font-style: italic; }
  [data-theme="light"] .notes-area { background: repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(120,85,40,0.18) 31px, rgba(120,85,40,0.18) 32px), linear-gradient(165deg, #fdf6e4, #faf2dc); background-attachment: local; }

  .notes-stats {
    margin-top: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 0.5rem;
  }
  .notes-stats strong { color: var(--gold); font-weight: 700; }

  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--gold-dim), #4a3820); border: 2px solid var(--bg-deep); }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--gold), var(--gold-dim)); }

  .empty-state { text-align: center; padding: 5rem 2rem; }
  .empty-state .rune { font-family: 'Uncial Antiqua', serif; font-size: 4rem; color: var(--gold-dim); margin-bottom: 1rem; }
  .empty-state h2 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0 0 0.5rem; }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: var(--text-muted); margin: 0 0 1.5rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }
  @media (max-width: 500px) { .form-row, .form-row-3 { grid-template-columns: 1fr; } }

  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

  /* =========================================================
     === SEZIONE STATISTICHE & CAOS ===
     ========================================================= */

  .caos-wrap { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
  @media (min-width: 640px) { .caos-wrap { padding: 0 1.5rem; } }

  .caos-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  @media (min-width: 1100px) {
    .caos-grid { grid-template-columns: 1.5fr 1fr; }
  }

  /* ---- Counter del Destino ---- */
  .counter-section-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .counter-section-title::before,
  .counter-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .player-counters {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .player-row {
    position: relative;
    background: linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 0.9rem 1.1rem;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 1rem;
    align-items: center;
    box-shadow: var(--shadow-card);
    /* Layout stabile: altezza fissa e overflow contenuto. Le animazioni
       vivono in layer absolute interni che non spingono il flow esterno. */
    overflow: hidden;
    min-height: 78px;
    contain: layout paint;
    transition: border-color 0.35s ease, box-shadow 0.35s ease;
  }
  @media (max-width: 600px) {
    .player-row { grid-template-columns: 1fr; gap: 0.6rem; min-height: 160px; }
  }

  .player-row-name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-strong);
  }
  .player-row-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border-soft);
    color: var(--text-strong);
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    padding: 0.3rem 0.2rem;
    outline: none;
    width: 100%;
    min-width: 120px;
  }
  .player-row-name-input:focus { border-bottom-color: var(--gold); }
  .player-row-name-input::placeholder { color: var(--text-faint); font-style: italic; font-weight: 400; }

  /* D20 counter unit (gruppo: icona + counter + bottoni) */
  .d20-counter {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.35rem 0.65rem;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .d20-counter.crit-fail { border-color: rgba(220,60,60,0.5); box-shadow: inset 0 0 12px rgba(220,60,60,0.1); }
  .d20-counter.crit-success { border-color: rgba(232,200,120,0.55); box-shadow: inset 0 0 12px rgba(232,200,120,0.12); }

  .d20-icon {
    width: 38px;
    height: 38px;
    position: relative;
    flex-shrink: 0;
  }
  .d20-icon svg { width: 100%; height: 100%; }

  .d20-count {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 800;
    min-width: 24px;
    text-align: center;
    text-shadow: 0 0 12px currentColor;
  }
  .d20-count.fail-color { color: #ff6868; }
  .d20-count.succ-color { color: #ffd890; }

  .d20-arrows {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .d20-arrow {
    width: 22px;
    height: 18px;
    border: 1px solid var(--border-soft);
    background: linear-gradient(180deg, var(--bg-card-elevated), var(--bg-card));
    color: var(--gold);
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    padding: 0;
  }
  .d20-arrow:hover { border-color: var(--border-gold); color: var(--gold-bright); background: var(--bg-card-elevated); }
  .d20-arrow:active { transform: scale(0.9); }
  .d20-arrow svg { width: 10px; height: 10px; }

  .player-row-actions {
    display: flex;
    gap: 0.3rem;
    align-items: center;
  }

  /* ============================================================
     ANIMAZIONI COUNTER DEL DESTINO — Tre gradi di distruzione
     Niente più demoni/angeli emoji. Solo aure, crepe, void, catene.
     ============================================================ */

  /* Render dei contenuti della riga sopra i layer fx */
  .player-row.lvl1-fail > *, .player-row.lvl1-succ > *,
  .player-row.lvl2-fail > *, .player-row.lvl2-succ > *,
  .player-row.lvl3-fail > *, .player-row.lvl3-succ > * { position: relative; z-index: 2; }
  .player-row.lvl1-fail, .player-row.lvl1-succ,
  .player-row.lvl2-fail, .player-row.lvl2-succ,
  .player-row.lvl3-fail, .player-row.lvl3-succ { isolation: isolate; }

  /* ============================================================
     SOGLIA 3 — AURA ENERGETICA
     ============================================================ */
  .player-row.lvl1-fail {
    border-color: rgba(180,40,40,0.6);
    background:
      radial-gradient(ellipse at 50% 50%, rgba(60,10,10,0.35) 0%, transparent 70%),
      linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
  }
  .player-row.lvl1-fail::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 6px;
    background: radial-gradient(ellipse at center, rgba(220,40,40,0.25) 0%, transparent 70%);
    box-shadow:
      inset 0 0 30px rgba(180,30,30,0.35),
      0 0 32px rgba(180,30,30,0.55);
    pointer-events: none;
    animation: aura-fail 3s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes aura-fail {
    0%, 100% { opacity: 0.55; box-shadow: inset 0 0 30px rgba(180,30,30,0.35), 0 0 32px rgba(180,30,30,0.55); }
    50% { opacity: 0.9; box-shadow: inset 0 0 42px rgba(220,40,40,0.5), 0 0 48px rgba(220,50,50,0.75); }
  }

  .player-row.lvl1-succ {
    border-color: rgba(232,200,120,0.65);
    background:
      radial-gradient(ellipse at 50% 50%, rgba(80,55,15,0.25) 0%, transparent 70%),
      linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
  }
  .player-row.lvl1-succ::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 6px;
    background: radial-gradient(ellipse at center, rgba(255,220,140,0.22) 0%, transparent 70%);
    box-shadow:
      inset 0 0 30px rgba(255,210,120,0.3),
      0 0 32px rgba(255,210,120,0.5);
    pointer-events: none;
    animation: aura-succ 3.5s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes aura-succ {
    0%, 100% { opacity: 0.55; box-shadow: inset 0 0 30px rgba(255,210,120,0.3), 0 0 32px rgba(255,210,120,0.5); }
    50% { opacity: 0.95; box-shadow: inset 0 0 44px rgba(255,235,180,0.45), 0 0 50px rgba(255,225,150,0.7); }
  }

  /* ============================================================
     SOGLIA 4 — RITO OSCURO (fail) / DEVOZIONE (succ)
     ============================================================ */

  /* --- Rito Oscuro (fail) --- */
  .player-row.lvl2-fail {
    border-color: rgba(200,40,40,0.85);
    background:
      radial-gradient(ellipse at 50% 50%, rgba(40,5,5,0.6) 0%, transparent 70%),
      linear-gradient(165deg, rgba(50,10,10,0.5), var(--bg-card));
    box-shadow:
      inset 0 0 36px rgba(140,20,20,0.5),
      0 0 28px rgba(200,40,40,0.45),
      var(--shadow-card);
    animation: lvl2-fail-pulse 2.4s ease-in-out infinite;
  }
  @keyframes lvl2-fail-pulse {
    0%, 100% { box-shadow: inset 0 0 36px rgba(140,20,20,0.5), 0 0 28px rgba(200,40,40,0.45), var(--shadow-card); }
    50% { box-shadow: inset 0 0 50px rgba(200,40,40,0.7), 0 0 42px rgba(220,50,30,0.65), var(--shadow-card); }
  }

  /* Pentacolo SVG che si disegna progressivamente (stroke-dasharray) */
  .fx-pentacle {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .fx-pentacle svg {
    width: 78px;
    height: 78px;
    opacity: 0.85;
    filter: drop-shadow(0 0 8px rgba(255,40,20,0.85)) drop-shadow(0 0 16px rgba(255,80,30,0.55));
    animation: pentacle-pulse 2.5s ease-in-out infinite;
  }
  @keyframes pentacle-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,40,20,0.85)) drop-shadow(0 0 16px rgba(255,80,30,0.55)); }
    50% { filter: drop-shadow(0 0 14px rgba(255,80,30,1)) drop-shadow(0 0 28px rgba(255,120,40,0.8)); }
  }
  .fx-pentacle .pentacle-star {
    fill: none;
    stroke: #ff4828;
    stroke-width: 2;
    stroke-dasharray: 280;
    stroke-dashoffset: 280;
    animation: pentacle-draw 4s ease-out forwards, pentacle-glow 2.5s ease-in-out infinite 4s;
  }
  .fx-pentacle .pentacle-circle {
    fill: none;
    stroke: #ff5028;
    stroke-width: 1.5;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: pentacle-draw 3s ease-out forwards;
  }
  @keyframes pentacle-draw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes pentacle-glow {
    0%, 100% { stroke: #ff4828; stroke-width: 2; }
    50% { stroke: #ff8050; stroke-width: 2.4; }
  }

  /* Mani spettrali che disegnano il pentacolo */
  .fx-spectral-hands {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .fx-spectral-hands .hand {
    position: absolute;
    width: 32px;
    height: 32px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(220,180,180,0.45);
    filter: blur(0.6px) drop-shadow(0 0 8px rgba(255,80,80,0.6));
    animation: hand-trace 4s linear infinite;
  }
  .fx-spectral-hands .hand.left {
    left: 50%;
    transform-origin: -22px center;
    animation-direction: normal;
  }
  .fx-spectral-hands .hand.right {
    left: 50%;
    transform-origin: -22px center;
    animation-delay: 2s;
    animation-direction: reverse;
  }
  @keyframes hand-trace {
    0% { transform: translate(-50%, -50%) rotate(0deg) translateX(40px); opacity: 0; }
    10% { opacity: 0.85; }
    90% { opacity: 0.85; }
    100% { transform: translate(-50%, -50%) rotate(360deg) translateX(40px); opacity: 0; }
  }

  /* --- Devozione (succ) --- */
  .player-row.lvl2-succ {
    border-color: rgba(255,220,140,0.85);
    background:
      radial-gradient(ellipse at 50% 50%, rgba(80,60,20,0.4) 0%, transparent 70%),
      linear-gradient(165deg, rgba(50,40,15,0.4), var(--bg-card));
    box-shadow:
      inset 0 0 38px rgba(220,180,80,0.35),
      0 0 32px rgba(255,220,140,0.5),
      var(--shadow-card);
    animation: lvl2-succ-pulse 3s ease-in-out infinite;
  }
  @keyframes lvl2-succ-pulse {
    0%, 100% { box-shadow: inset 0 0 38px rgba(220,180,80,0.35), 0 0 32px rgba(255,220,140,0.5), var(--shadow-card); }
    50% { box-shadow: inset 0 0 52px rgba(255,235,180,0.55), 0 0 48px rgba(255,220,140,0.75), var(--shadow-card); }
  }

  /* Figura in preghiera (sagoma SVG centrale) */
  .fx-praying-figure {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fx-praying-figure svg {
    width: 72px;
    height: 72px;
    opacity: 0.85;
    filter: drop-shadow(0 0 10px rgba(255,220,140,0.9)) drop-shadow(0 0 20px rgba(255,200,100,0.55));
    animation: praying-sway 4s ease-in-out infinite;
  }
  @keyframes praying-sway {
    0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(255,220,140,0.9)) drop-shadow(0 0 20px rgba(255,200,100,0.55)); }
    50% { transform: translateY(-3px); filter: drop-shadow(0 0 16px rgba(255,235,170,1)) drop-shadow(0 0 32px rgba(255,210,120,0.85)); }
  }
  .fx-praying-figure .figure-body { fill: rgba(40,28,10,0.85); stroke: #ffd870; stroke-width: 1.2; }
  .fx-praying-figure .figure-glow { fill: none; stroke: rgba(255,240,180,0.6); stroke-width: 0.5; }

  /* Particelle di luce che salgono */
  .fx-light-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .fx-light-particles span {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff8d0 0%, #ffd870 60%, transparent 100%);
    box-shadow: 0 0 8px rgba(255,220,140,0.9), 0 0 14px rgba(255,235,170,0.5);
    animation: light-rise 3.5s ease-in infinite;
    bottom: -6px;
  }
  .fx-light-particles span:nth-child(1)  { left: 10%; animation-delay: 0s; }
  .fx-light-particles span:nth-child(2)  { left: 22%; animation-delay: 0.4s; width: 4px; height: 4px; }
  .fx-light-particles span:nth-child(3)  { left: 35%; animation-delay: 0.8s; }
  .fx-light-particles span:nth-child(4)  { left: 48%; animation-delay: 1.2s; }
  .fx-light-particles span:nth-child(5)  { left: 62%; animation-delay: 0.2s; width: 4px; height: 4px; }
  .fx-light-particles span:nth-child(6)  { left: 75%; animation-delay: 0.6s; }
  .fx-light-particles span:nth-child(7)  { left: 88%; animation-delay: 1.0s; }
  .fx-light-particles span:nth-child(8)  { left: 16%; animation-delay: 1.5s; }
  .fx-light-particles span:nth-child(9)  { left: 42%; animation-delay: 1.8s; }
  .fx-light-particles span:nth-child(10) { left: 70%; animation-delay: 2.1s; }
  @keyframes light-rise {
    0% { transform: translateY(0) scale(0.6); opacity: 0; }
    15% { opacity: 1; transform: translateY(-10px) scale(1); }
    100% { transform: translateY(-90px) scale(0.5); opacity: 0; }
  }

  /* ============================================================
     SOGLIA 5+ — APOCALISSE (fail) / INTERVENTO DIVINO (succ)
     ============================================================ */
  .player-row.lvl3-fail {
    border: 2px solid #ff2828;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(60,5,5,0.9) 0%, rgba(40,0,0,0.6) 40%, transparent 80%),
      linear-gradient(165deg, #1a0606, #100404);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.85),
      inset 0 0 30px rgba(200,20,20,0.5),
      0 0 50px rgba(220,30,30,0.7),
      0 0 100px rgba(120,0,0,0.5);
    animation: lvl3-fail-curse 0.4s steps(4) infinite;
  }
  @keyframes lvl3-fail-curse {
    0%, 100% { filter: brightness(1) contrast(1.15) hue-rotate(0deg); }
    50% { filter: brightness(1.18) contrast(1.35) hue-rotate(-6deg); }
  }

  /* Pentacolo completo fiammeggiante (versione lvl3 — più grosso e ardente) */
  .fx-pentacle-burning {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fx-pentacle-burning svg {
    width: 90px;
    height: 90px;
    filter: drop-shadow(0 0 12px rgba(255,80,30,1)) drop-shadow(0 0 28px rgba(255,40,20,0.85));
    animation: pentacle-rotate-burn 12s linear infinite;
  }
  .fx-pentacle-burning .pentacle-star,
  .fx-pentacle-burning .pentacle-circle {
    fill: none;
    stroke: #ff4020;
    stroke-width: 2.2;
    animation: pentacle-burn-stroke 1.4s ease-in-out infinite;
  }
  .fx-pentacle-burning .pentacle-inner-circle {
    fill: rgba(255,80,30,0.18);
    stroke: #ffa840;
    stroke-width: 0.8;
  }
  @keyframes pentacle-burn-stroke {
    0%, 100% { stroke: #ff4020; stroke-width: 2.2; }
    50% { stroke: #ffaa30; stroke-width: 2.8; }
  }
  @keyframes pentacle-rotate-burn {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Lampi rossi */
  .fx-lightning {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }
  .fx-lightning span {
    position: absolute;
    top: 0;
    width: 2px;
    background: linear-gradient(180deg, transparent, #ff4020 30%, #ffaa50 50%, #ff4020 70%, transparent);
    transform-origin: top center;
    box-shadow: 0 0 8px rgba(255,80,30,0.9), 0 0 16px rgba(255,40,20,0.7);
    opacity: 0;
    animation: lightning-strike 3s ease-out infinite;
  }
  .fx-lightning span:nth-child(1) { left: 12%; height: 70%; animation-delay: 0.4s; transform: rotate(-12deg); }
  .fx-lightning span:nth-child(2) { left: 30%; height: 90%; animation-delay: 1.2s; transform: rotate(8deg); }
  .fx-lightning span:nth-child(3) { left: 58%; height: 75%; animation-delay: 0.0s; transform: rotate(-6deg); }
  .fx-lightning span:nth-child(4) { left: 78%; height: 85%; animation-delay: 1.8s; transform: rotate(10deg); }
  .fx-lightning span:nth-child(5) { left: 90%; height: 60%; animation-delay: 2.4s; transform: rotate(-4deg); }
  @keyframes lightning-strike {
    0%, 4% { opacity: 0; }
    5% { opacity: 1; }
    9% { opacity: 0.4; }
    11% { opacity: 1; }
    18% { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Fumo nero che ribolle alla base */
  .fx-black-smoke {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    height: 50%;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse at 15% 100%, rgba(0,0,0,0.85) 0%, transparent 50%),
      radial-gradient(ellipse at 45% 100%, rgba(15,5,5,0.9) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 100%, rgba(0,0,0,0.85) 0%, transparent 50%),
      radial-gradient(ellipse at 95% 100%, rgba(20,8,8,0.8) 0%, transparent 50%);
    filter: blur(6px);
    animation: black-smoke-roil 5s ease-in-out infinite;
  }
  @keyframes black-smoke-roil {
    0%, 100% { transform: translateX(0) scale(1, 1); opacity: 0.85; }
    33% { transform: translateX(10px) scale(1.05, 0.95); opacity: 1; }
    66% { transform: translateX(-8px) scale(0.95, 1.05); opacity: 0.9; }
  }

  /* --- Intervento Divino (succ) --- */
  .player-row.lvl3-succ {
    border: 2px solid #fff0b0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255,240,200,0.35) 0%, rgba(120,90,40,0.3) 40%, transparent 80%),
      linear-gradient(165deg, #2a1f08, #1f1606);
    box-shadow:
      inset 0 0 50px rgba(255,220,140,0.45),
      0 0 60px rgba(255,220,140,0.8),
      0 0 120px rgba(255,200,100,0.5);
    animation: lvl3-succ-divine 3s ease-in-out infinite;
  }
  @keyframes lvl3-succ-divine {
    0%, 100% { filter: brightness(1.05) saturate(1.15); }
    50% { filter: brightness(1.25) saturate(1.35); }
  }

  /* Angelo in SVG (silhouette + ali animate) */
  .fx-angel {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fx-angel svg {
    width: 130px;
    height: 100%;
    max-height: 100px;
    opacity: 0.85;
    filter: drop-shadow(0 0 12px rgba(255,240,180,1)) drop-shadow(0 0 28px rgba(255,220,140,0.7));
  }
  .fx-angel .angel-body {
    fill: rgba(40,28,10,0.7);
    stroke: #ffe890;
    stroke-width: 1.2;
  }
  .fx-angel .angel-halo {
    fill: none;
    stroke: #fff0b0;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(255,240,180,1));
  }
  .fx-angel .wing-left,
