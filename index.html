  .fx-angel .wing-right {
    fill: rgba(255,245,210,0.4);
    stroke: rgba(255,235,170,0.8);
    stroke-width: 0.8;
    transform-origin: 50% 50%;
    animation: wing-beat 2.4s ease-in-out infinite;
  }
  .fx-angel .wing-left { transform-origin: 65% 35%; }
  .fx-angel .wing-right { transform-origin: 35% 35%; animation-delay: 0s; }
  @keyframes wing-beat {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    50% { transform: scaleX(0.7) scaleY(1.05); }
  }

  /* Luce accecante che emana dai bordi (uguale per tutti i lati) */
  .fx-divine-light {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,200,0.8),
      inset 0 0 30px rgba(255,240,180,0.8),
      inset 0 0 80px rgba(255,220,140,0.5);
    animation: divine-light-pulse 2s ease-in-out infinite;
    border-radius: inherit;
  }
  @keyframes divine-light-pulse {
    0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,255,200,0.8), inset 0 0 30px rgba(255,240,180,0.8), inset 0 0 80px rgba(255,220,140,0.5); }
    50% { box-shadow: inset 0 0 0 2px rgba(255,255,230,1), inset 0 0 50px rgba(255,250,210,1), inset 0 0 120px rgba(255,235,170,0.7); }
  }

  /* Raggi divini di sfondo (uniformi attorno) */
  .fx-divine-rays-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    border-radius: inherit;
  }
  .fx-divine-rays-bg::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 250%; height: 250%;
    transform: translate(-50%, -50%);
    background:
      conic-gradient(from 0deg,
        transparent 0deg,
        rgba(255,240,180,0.18) 8deg,
        transparent 16deg,
        transparent 55deg,
        rgba(255,235,170,0.16) 63deg,
        transparent 71deg,
        transparent 115deg,
        rgba(255,240,180,0.18) 123deg,
        transparent 131deg,
        transparent 175deg,
        rgba(255,235,170,0.16) 183deg,
        transparent 191deg,
        transparent 235deg,
        rgba(255,240,180,0.18) 243deg,
        transparent 251deg,
        transparent 295deg,
        rgba(255,235,170,0.16) 303deg,
        transparent 311deg);
    animation: divine-rays-spin 16s linear infinite;
  }
  @keyframes divine-rays-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }


  /* Pulsante aggiungi player + import iniziativa */
  .caos-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
  }

  /* =========================================================
     D20 DELLA CONDANNA
     ========================================================= */

  .condanna-panel {
    background: linear-gradient(165deg, rgba(40,10,10,0.5), var(--bg-card));
    border: 1px solid rgba(140,30,30,0.35);
    border-radius: 4px;
    padding: 1.5rem 1.25rem;
    box-shadow: var(--shadow-card), inset 0 0 30px rgba(80,10,10,0.25);
    position: sticky;
    top: 1rem;
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
  }

  .condanna-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    color: #d4a070;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .condanna-sub {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
  }

  /* Wheel: D20 con teschio e spicchi rotondi */
  .doom-wheel-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 1rem;
  }
  .doom-wheel-svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 0 18px rgba(120,20,20,0.4));
  }
  .doom-slice {
    fill: rgba(40,20,20,0.7);
    stroke: rgba(180,60,60,0.4);
    stroke-width: 1.5;
    transition: fill 0.5s ease, filter 0.5s ease;
  }
  .doom-slice.filled {
    fill: #8a1a1a;
    filter: drop-shadow(0 0 8px rgba(220,30,30,0.8));
    animation: blood-pulse 2.2s ease-in-out infinite;
  }
  @keyframes blood-pulse {
    0%, 100% { fill: #8a1a1a; filter: drop-shadow(0 0 8px rgba(220,30,30,0.7)); }
    50% { fill: #c82828; filter: drop-shadow(0 0 16px rgba(255,40,40,0.95)); }
  }

  .doom-skull-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #3a2828 0%, #1a0e0e 70%);
    border: 2px solid rgba(180,60,60,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    transition: all 0.2s ease;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.7),
      0 0 24px rgba(180,30,30,0.4);
    color: #d8d0c8;
    text-shadow: 0 0 12px rgba(255,60,60,0.4);
    user-select: none;
  }
  .doom-skull-btn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    border-color: #c83030;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.7), 0 0 36px rgba(220,40,40,0.7);
  }
  .doom-skull-btn:active { transform: translate(-50%, -50%) scale(0.95); }
  .doom-skull-btn.full {
    animation: skull-scream 0.5s ease-in-out infinite;
    background: radial-gradient(circle at 30% 30%, #7a2020 0%, #2a0808 70%);
  }
  @keyframes skull-scream {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
    20% { transform: translate(-52%, -48%) rotate(-3deg); }
    40% { transform: translate(-48%, -52%) rotate(3deg); }
    60% { transform: translate(-52%, -50%) rotate(-2deg); }
    80% { transform: translate(-48%, -48%) rotate(2deg); }
  }

  .doom-progress {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }
  .doom-progress strong { color: #ff7070; font-size: 16px; }

  .doom-controls {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .doom-controls button {
    background: linear-gradient(180deg, rgba(140,30,30,0.4), rgba(70,15,15,0.5));
    border: 1px solid rgba(180,60,60,0.4);
    color: #ffc8c8;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 0.45rem 0.85rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .doom-controls button:hover {
    background: linear-gradient(180deg, rgba(180,40,40,0.6), rgba(100,20,20,0.6));
    border-color: rgba(220,80,80,0.7);
    color: #fff;
  }
  .doom-controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* =========================================================
     INDICATORE DI STADIO (D6 > D8 > D20)
     ========================================================= */
  .doom-stage-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
    padding: 0.5rem 0.6rem;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(140,30,30,0.25);
    border-radius: 3px;
  }
  .stage-dot {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.55rem;
    border-radius: 2px;
    background: rgba(50,20,20,0.4);
    color: var(--text-faint);
    border: 1px solid rgba(120,60,60,0.25);
    transition: all 0.3s ease;
  }
  .stage-dot.active {
    background: linear-gradient(180deg, rgba(140,30,30,0.55), rgba(80,15,15,0.55));
    color: #ffc8c8;
    border-color: rgba(180,60,60,0.6);
  }
  .stage-dot.current {
    color: #ffffff;
    box-shadow: 0 0 12px rgba(220,40,40,0.55), inset 0 0 8px rgba(255,80,80,0.25);
    border-color: rgba(255,80,80,0.8);
  }
  .stage-dot.current.final {
    background: linear-gradient(180deg, #8a1010, #4a0606);
    color: #fff8d0;
    box-shadow: 0 0 18px rgba(255,80,30,0.7), inset 0 0 12px rgba(255,160,40,0.3);
    border-color: #ff5028;
  }
  .stage-arrow {
    color: rgba(140,60,60,0.6);
    font-size: 10px;
    line-height: 1;
  }

  /* Stage 2: pannello con tinta più satura */
  .condanna-panel.doom-stage-2 {
    background: linear-gradient(165deg, rgba(60,15,15,0.55), var(--bg-card));
    border-color: rgba(180,50,50,0.5);
    box-shadow: var(--shadow-card), inset 0 0 36px rgba(100,15,15,0.35);
  }

  /* Stage 3: pannello infernale */
  .condanna-panel.doom-stage-3 {
    background:
      radial-gradient(ellipse at 50% 30%, rgba(180,40,15,0.3) 0%, transparent 60%),
      linear-gradient(165deg, rgba(40,5,5,0.85), #1a0606);
    border: 1px solid rgba(255,80,30,0.5);
    box-shadow:
      var(--shadow-card),
      inset 0 0 60px rgba(120,20,10,0.5),
      0 0 32px rgba(220,40,20,0.35);
  }
  .condanna-panel.doom-stage-3 .condanna-title {
    color: #ffb070;
    text-shadow: 0 0 18px rgba(255,80,30,0.6);
    font-size: 15px;
    letter-spacing: 0.32em;
    animation: stage3-title-pulse 2.5s ease-in-out infinite;
  }
  @keyframes stage3-title-pulse {
    0%, 100% { text-shadow: 0 0 18px rgba(255,80,30,0.6); }
    50% { text-shadow: 0 0 30px rgba(255,120,40,1); }
  }
  .condanna-panel.doom-stage-3 .condanna-sub { color: #d8a080; }

  /* =========================================================
     STADIO 3 — D20 stilizzato (facce illuminabili)
     ========================================================= */
  .doom-d20-svg .d20-face {
    fill: rgba(30,18,15,0.85);
    stroke: rgba(180,90,60,0.5);
    stroke-width: 1;
    transition: fill 0.6s ease, stroke 0.4s ease, filter 0.5s ease;
  }
  .doom-d20-svg .d20-face-outer {
    fill: rgba(45,22,18,0.9);
  }
  .doom-d20-svg .d20-face-inner {
    fill: rgba(60,28,22,0.85);
  }
  .doom-d20-svg .d20-face.lit {
    fill: url(#unused); /* placeholder, sovrascritto sotto */
    fill: #ff4a18;
    stroke: #ffd070;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 8px rgba(255,80,30,0.95));
    animation: lava-pulse 2s ease-in-out infinite;
  }
  .doom-d20-svg .d20-face-inner.lit { fill: #ffaa30; }
  .doom-d20-svg .d20-face-outer.lit { fill: #c83018; }
  @keyframes lava-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,80,30,0.95)) brightness(1); }
    50% { filter: drop-shadow(0 0 18px rgba(255,140,50,1)) brightness(1.25); }
  }
  .doom-d20-svg .d20-rim {
    animation: d20-rim-rotate 18s linear infinite;
    transform-origin: 130px 130px;
  }
  @keyframes d20-rim-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Skull per stadio 3 — più infernale */
  .doom-skull-btn.doom-skull-stage-3 {
    background: radial-gradient(circle at 30% 30%, #5a1818 0%, #1a0404 70%);
    border: 2px solid rgba(255,80,30,0.7);
    color: #fff0d0;
    text-shadow: 0 0 18px rgba(255,80,30,0.9), 0 0 36px rgba(255,40,20,0.7);
    box-shadow:
      inset 0 0 24px rgba(0,0,0,0.85),
      0 0 36px rgba(220,50,20,0.7);
  }
  .doom-skull-btn.doom-skull-stage-3:hover {
    box-shadow:
      inset 0 0 24px rgba(0,0,0,0.85),
      0 0 50px rgba(255,80,30,0.9);
  }
  .doom-skull-btn.transforming {
    animation: skull-violent-shake 0.15s linear infinite;
    pointer-events: none;
  }
  @keyframes skull-violent-shake {
    0% { transform: translate(-50%, -50%) translate(0, 0); }
    25% { transform: translate(-50%, -50%) translate(-3px, 2px) rotate(-4deg); }
    50% { transform: translate(-50%, -50%) translate(2px, -2px) rotate(3deg); }
    75% { transform: translate(-50%, -50%) translate(-2px, -3px) rotate(-2deg); }
    100% { transform: translate(-50%, -50%) translate(3px, 1px) rotate(2deg); }
  }

  /* Animazione di shake del pannello durante la trasformazione */
  .condanna-panel.doom-shaking {
    animation: panel-violent-shake 0.18s linear infinite;
  }
  @keyframes panel-violent-shake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, -2px); }
    80% { transform: translate(2px, 1px); }
  }

  /* Particelle di cenere durante la trasformazione */
  .doom-ash-layer {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    overflow: visible;
    z-index: 50;
  }
  .doom-ash-layer .ash-particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff8030 0%, #d04020 50%, transparent 100%);
    box-shadow: 0 0 6px rgba(255,80,30,0.9);
    animation: ash-burst 1.6s ease-out forwards;
  }
  /* 24 particelle con angoli e ritardi distribuiti */
  .doom-ash-layer .ash-particle:nth-child(1)  { top: 50%; left: 50%; --tx: -120px; --ty: -90px; --rot: -50deg; animation-delay: 0s; }
  .doom-ash-layer .ash-particle:nth-child(2)  { top: 50%; left: 50%; --tx: 120px;  --ty: -90px; --rot: 50deg;  animation-delay: 0.05s; }
  .doom-ash-layer .ash-particle:nth-child(3)  { top: 50%; left: 50%; --tx: 0px;    --ty: -140px;--rot: 0deg;   animation-delay: 0.1s; width: 5px; height: 5px; }
  .doom-ash-layer .ash-particle:nth-child(4)  { top: 50%; left: 50%; --tx: -150px; --ty: 30px;  --rot: -90deg; animation-delay: 0.15s; }
  .doom-ash-layer .ash-particle:nth-child(5)  { top: 50%; left: 50%; --tx: 150px;  --ty: 30px;  --rot: 90deg;  animation-delay: 0.2s; }
  .doom-ash-layer .ash-particle:nth-child(6)  { top: 50%; left: 50%; --tx: -100px; --ty: 110px; --rot: -130deg;animation-delay: 0.05s; width: 3px; height: 3px; }
  .doom-ash-layer .ash-particle:nth-child(7)  { top: 50%; left: 50%; --tx: 100px;  --ty: 110px; --rot: 130deg; animation-delay: 0.25s; }
  .doom-ash-layer .ash-particle:nth-child(8)  { top: 50%; left: 50%; --tx: 0px;    --ty: 150px; --rot: 180deg; animation-delay: 0.3s; }
  .doom-ash-layer .ash-particle:nth-child(9)  { top: 50%; left: 50%; --tx: -80px;  --ty: -60px; --rot: -45deg; animation-delay: 0.35s; width: 3px; height: 3px; }
  .doom-ash-layer .ash-particle:nth-child(10) { top: 50%; left: 50%; --tx: 80px;   --ty: -60px; --rot: 45deg;  animation-delay: 0.4s; }
  .doom-ash-layer .ash-particle:nth-child(11) { top: 50%; left: 50%; --tx: -160px; --ty: -20px; --rot: -100deg;animation-delay: 0.1s; width: 5px; height: 5px; }
  .doom-ash-layer .ash-particle:nth-child(12) { top: 50%; left: 50%; --tx: 160px;  --ty: -20px; --rot: 100deg; animation-delay: 0.15s; }
  .doom-ash-layer .ash-particle:nth-child(13) { top: 50%; left: 50%; --tx: -50px;  --ty: -150px;--rot: -20deg; animation-delay: 0.45s; }
  .doom-ash-layer .ash-particle:nth-child(14) { top: 50%; left: 50%; --tx: 50px;   --ty: -150px;--rot: 20deg;  animation-delay: 0.5s; }
  .doom-ash-layer .ash-particle:nth-child(15) { top: 50%; left: 50%; --tx: -130px; --ty: 60px;  --rot: -110deg;animation-delay: 0.2s; }
  .doom-ash-layer .ash-particle:nth-child(16) { top: 50%; left: 50%; --tx: 130px;  --ty: 60px;  --rot: 110deg; animation-delay: 0.25s; }
  .doom-ash-layer .ash-particle:nth-child(17) { top: 50%; left: 50%; --tx: -40px;  --ty: 130px; --rot: -160deg;animation-delay: 0.55s; }
  .doom-ash-layer .ash-particle:nth-child(18) { top: 50%; left: 50%; --tx: 40px;   --ty: 130px; --rot: 160deg; animation-delay: 0.6s; }
  .doom-ash-layer .ash-particle:nth-child(19) { top: 50%; left: 50%; --tx: -90px;  --ty: -120px;--rot: -35deg; animation-delay: 0.35s; }
  .doom-ash-layer .ash-particle:nth-child(20) { top: 50%; left: 50%; --tx: 90px;   --ty: -120px;--rot: 35deg;  animation-delay: 0.4s; }
  .doom-ash-layer .ash-particle:nth-child(21) { top: 50%; left: 50%; --tx: -60px;  --ty: 100px; --rot: -150deg;animation-delay: 0.65s; }
  .doom-ash-layer .ash-particle:nth-child(22) { top: 50%; left: 50%; --tx: 60px;   --ty: 100px; --rot: 150deg; animation-delay: 0.7s; }
  .doom-ash-layer .ash-particle:nth-child(23) { top: 50%; left: 50%; --tx: -110px; --ty: -10px; --rot: -85deg; animation-delay: 0.05s; width: 5px; height: 5px; }
  .doom-ash-layer .ash-particle:nth-child(24) { top: 50%; left: 50%; --tx: 110px;  --ty: -10px; --rot: 85deg;  animation-delay: 0.1s; width: 5px; height: 5px; }
  @keyframes ash-burst {
    0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.3); opacity: 0; }
    10% { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0.3) rotate(var(--rot)); opacity: 0; }
  }

  /* Flash full-screen durante la trasformazione */
  .doom-transform-flash {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,140,40,0.6) 0%, rgba(180,30,10,0.4) 30%, rgba(0,0,0,0) 70%);
    opacity: 0;
    animation: doom-flash 1.7s ease-out forwards;
  }
  .doom-transform-flash.final {
    /* Trasformazione finale: flash più potente e prolungato */
    background: radial-gradient(ellipse at center, rgba(255,220,140,0.85) 0%, rgba(220,80,20,0.6) 25%, rgba(80,0,0,0.5) 60%, rgba(0,0,0,0.3) 100%);
    animation: doom-flash-final 1.7s ease-out forwards;
  }
  @keyframes doom-flash {
    0% { opacity: 0; }
    15% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes doom-flash-final {
    0% { opacity: 0; backdrop-filter: blur(0); }
    10% { opacity: 1; backdrop-filter: blur(4px); }
    25% { opacity: 0.85; }
    50% { opacity: 0.6; backdrop-filter: blur(2px); }
    100% { opacity: 0; backdrop-filter: blur(0); }
  }

  /* Eyebrow del modal */
  .doom-modal-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: #ff9870;
    margin-bottom: 0.6rem;
    text-shadow: 0 0 12px rgba(255,80,30,0.4);
  }
  .doom-modal-lvl-1 .doom-modal-eyebrow { color: #d8a080; }
  .doom-modal-lvl-3 .doom-modal-eyebrow {
    color: #ffd070;
    text-shadow: 0 0 16px rgba(255,140,40,0.7);
    animation: doom-eyebrow-pulse 2s ease-in-out infinite;
  }
  @keyframes doom-eyebrow-pulse {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 1; text-shadow: 0 0 24px rgba(255,180,60,1); }
  }
  /* Modal level 3 (catastrofico) — più imponente */
  .doom-modal-stage-3 {
    border-width: 3px;
    border-color: #ff4020;
    box-shadow:
      0 0 0 1px rgba(255,80,30,0.5),
      0 0 80px rgba(220,40,20,0.85),
      0 0 160px rgba(120,0,0,0.6);
  }
  .doom-modal-stage-3 .doom-modal-title {
    color: #ffd890;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    text-shadow: 0 0 24px rgba(255,140,40,0.9);
  }
  .doom-modal-lvl-3 { background: radial-gradient(ellipse at center, rgba(100,0,0,0.92) 0%, rgba(0,0,0,0.98) 80%); }


  /* Modal evento malvagio */
  .doom-modal-backdrop {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(80,0,0,0.85) 0%, rgba(0,0,0,0.95) 80%);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    animation: doom-bg-fade 0.4s ease-out;
  }
  @keyframes doom-bg-fade {
    from { opacity: 0; backdrop-filter: blur(0); }
    to { opacity: 1; backdrop-filter: blur(6px); }
  }
  .doom-modal {
    background: linear-gradient(165deg, #2a0808 0%, #1a0404 100%);
    border: 2px solid #8a1a1a;
    border-radius: 6px;
    max-width: 560px;
    width: 100%;
    padding: 2rem;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255,40,40,0.3),
      0 0 60px rgba(180,20,20,0.6),
      0 0 120px rgba(120,0,0,0.4);
    animation: doom-modal-in 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
  }
  @keyframes doom-modal-in {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .doom-modal::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 6px;
    background: linear-gradient(135deg, transparent, rgba(255,40,40,0.4), transparent);
    z-index: -1;
    animation: doom-border-glow 3s linear infinite;
  }
  @keyframes doom-border-glow {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }
  .doom-modal-skull {
    font-size: 80px;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 24px rgba(255,40,40,0.8));
    animation: skull-bob 2s ease-in-out infinite;
  }
  @keyframes skull-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .doom-modal-title {
    font-family: 'Uncial Antiqua', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: #ffb0b0;
    text-shadow: 0 0 20px rgba(255,40,40,0.7);
    margin-bottom: 1.25rem;
    letter-spacing: 0.05em;
  }
  .doom-event-text {
    font-family: 'EB Garamond', serif;
    font-size: 19px;
    font-style: italic;
    color: #ffe8d8;
    line-height: 1.6;
    padding: 1.25rem;
    background: rgba(60,10,10,0.5);
    border-left: 3px solid #c83030;
    border-right: 3px solid #c83030;
    margin-bottom: 1.5rem;
  }
  .doom-modal-actions {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .doom-modal-btn {
    background: linear-gradient(180deg, #c82828, #6a1414);
    border: 1px solid #4a0a0a;
    color: #ffe0d8;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 11px;
    padding: 0.7rem 1.4rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 0 rgba(255,180,180,0.2);
  }
  .doom-modal-btn:hover {
    background: linear-gradient(180deg, #e83838, #7a1818);
    box-shadow: 0 6px 20px rgba(220,40,40,0.5);
    transform: translateY(-1px);
  }
  /* =========================================================
     === SEZIONE GENERATORE NPC ===
     ========================================================= */
  .generatore-wrap { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
  @media (min-width: 640px) { .generatore-wrap { padding: 0 1.5rem; } }

  .generatore-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  @media (min-width: 960px) {
    .generatore-grid { grid-template-columns: 280px 1fr; }
  }

  /* --- NPC Sheet --- */
  .npc-sheet {
    background: linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
    border: 1px solid var(--border-gold);
    border-radius: 6px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .npc-sheet-header {
    background: linear-gradient(135deg, var(--gold-dim), #5a3e1a 80%);
    padding: 0.55rem 1rem;
    border-bottom: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .npc-sheet-header-left { display: flex; align-items: center; gap: 0.45rem; }
  .npc-sheet-header svg { color: var(--gold-bright); flex-shrink: 0; width: 14px; height: 14px; }
  .npc-sheet-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--gold-bright);
  }
  .npc-sheet-body { padding: 0.9rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .npc-top-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  @media (max-width: 600px) { .npc-top-panel { grid-template-columns: 1fr; } }

  .npc-field-block { display: flex; flex-direction: column; gap: 0.2rem; }
  .npc-field-block.full { grid-column: 1 / -1; }
  .npc-field-lbl {
    font-family: 'Cinzel', serif;
    font-size: 8.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    display: block;
  }
  .npc-field-input {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    padding: 0.4rem 0.7rem;
    border-radius: 3px;
    width: 100%;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .npc-field-input:focus {
    outline: none;
    border-color: var(--border-gold);
    background: var(--bg-card-elevated);
    box-shadow: 0 0 0 2px var(--gold-glow);
  }
  .npc-field-input::placeholder { color: var(--text-faint); font-style: italic; }
  .npc-field-textarea {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 13.5px;
    padding: 0.45rem 0.7rem;
    border-radius: 3px;
    width: 100%;
    resize: vertical;
    min-height: 54px;
    line-height: 1.5;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .npc-field-textarea:focus {
    outline: none;
    border-color: var(--border-gold);
    background: var(--bg-card-elevated);
    box-shadow: 0 0 0 2px var(--gold-glow);
  }
  .npc-field-textarea::placeholder { color: var(--text-faint); font-style: italic; }
  /* Textarea idea DM — grande per descrizioni ricche */
  .npc-idea-tall { min-height: 220px !important; }

  /* ---- Avatar NPC ---- */
  .npc-avatar-wrap { display:flex; gap:0.85rem; align-items:flex-start; }
  .npc-avatar-col  { display:flex; flex-direction:column; gap:0.3rem; align-items:center; }
  .npc-avatar-frame {
    width:136px; height:136px; flex-shrink:0;
    border:2px solid var(--border-gold); border-radius:4px;
    background:var(--bg-card); overflow:hidden; position:relative;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color 0.2s ease;
  }
  .npc-avatar-frame:hover { border-color:var(--gold-bright); }
  .npc-avatar-frame img { width:100%; height:100%; object-fit:cover; display:block; }
  .npc-avatar-ph { display:flex; flex-direction:column; align-items:center; gap:0.3rem; pointer-events:none; }
  .npc-avatar-ph svg { width:28px; height:28px; color:var(--text-faint); opacity:0.35; }
  .npc-avatar-ph span { font-family:'Cinzel',serif; font-size:7.5px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); opacity:0.5; text-align:center; }
  .npc-avatar-ov { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }
  .npc-av-spin { width:20px; height:20px; border:2px solid rgba(201,165,92,0.3); border-top-color:var(--gold); border-radius:50%; animation:npcSpin 0.75s linear infinite; }
  .npc-avatar-btns { display:flex; gap:0.25rem; width:136px; }
  .btn-av { flex:1; padding:0.2rem 0; font-family:'Cinzel',serif; font-size:7px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; border-radius:2px; cursor:pointer; border:1px solid; display:inline-flex; align-items:center; justify-content:center; gap:0.2rem; transition:all 0.18s ease; }
  .btn-av-gold { background:rgba(201,165,92,0.12); color:var(--gold); border-color:var(--border-gold); }
  .btn-av-gold:hover { background:rgba(201,165,92,0.22); }
  .btn-av-dim  { background:var(--bg-card); color:var(--text-faint); border-color:var(--border-subtle); }
  .btn-av-dim:hover { color:var(--text-muted); border-color:var(--border-soft); }
  .npc-avatar-urlrow { display:flex; gap:0.25rem; align-items:center; width:136px; }
  .npc-avatar-urlrow input { flex:1; min-width:0; background:var(--bg-card); border:1px solid var(--border-subtle); color:var(--text-main); font-family:'EB Garamond',serif; font-size:10px; padding:0.25rem 0.4rem; border-radius:2px; outline:none; }
  .npc-avatar-urlrow input:focus { border-color:var(--border-gold); }
  .npc-avatar-info { flex:1; display:flex; flex-direction:column; gap:0.3rem; justify-content:center; min-width:0; }
  .npc-avatar-name { font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--text-strong); line-height:1.2; word-break:break-word; }
  .npc-avatar-ruolo { font-family:'EB Garamond',serif; font-size:12.5px; font-style:italic; color:var(--gold-dim); }
  .npc-avatar-hint { font-family:'Cinzel',serif; font-size:8px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-faint); }
  /* HP e CA — riga compatta sotto le caratteristiche */
  .npc-hpca-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .npc-hpca-block {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.5rem 0.45rem;
    gap: 0.1rem;
    transition: border-color 0.2s ease;
  }
  .npc-hpca-block:focus-within { border-color: var(--border-gold); }
  .npc-hpca-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold);
  }
  .npc-hpca-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border-soft);
    color: var(--text-strong);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    width: 100%;
    padding: 1px 4px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .npc-hpca-input:focus { border-bottom-color: var(--gold); }
  .npc-hpca-input::placeholder { color: var(--text-faint); font-size: 13px; font-weight: 400; }
  /* Textarea oggetti/incantesimi — più spaziosa */
  .npc-oggetti-tall { min-height: 110px !important; }

  /* Griglia stat D&D 2024: abbreviazione in cima, modificatore GRANDE, punteggio piccolo sotto */
  .npc-stats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.35rem;
  }
  @media (max-width: 500px) { .npc-stats-grid { grid-template-columns: repeat(3, 1fr); } }
  .stat-block {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.15rem 0.45rem;
    gap: 0;
    transition: border-color 0.2s ease;
  }
  .stat-block:focus-within { border-color: var(--border-gold); }
  .stat-abbr {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 0.05rem;
  }
  .stat-modifier {
    font-family: 'Cinzel', serif;
    font-size: 19px;
    font-weight: 800;
    color: var(--text-strong);
    line-height: 1.05;
    pointer-events: none;
  }
  .stat-score-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border-soft);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    width: 36px;
    padding: 1px 2px;
    margin-top: 0.12rem;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .stat-score-input:focus { border-bottom-color: var(--gold); color: var(--text-main); }

  /* Section divider label */
  .npc-section-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 0.28rem;
    margin-bottom: 0.3rem;
  }

  /* ---- ATTACCHI & INCANTESIMI — stile scheda D&D ---- */
  .npc-attacks-wrap {
    border: 2px solid var(--border-gold);
    border-radius: 4px;
    background: var(--bg-card);
    overflow: hidden;
    position: relative;
  }
  .npc-attacks-wrap::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    pointer-events: none;
    z-index: 0;
  }
  .npc-attacks-inner { position: relative; z-index: 1; }
  .npc-attacks-header {
    display: grid;
    grid-template-columns: 1fr 80px 110px;
    gap: 0;
    border-bottom: 1px solid var(--border-gold);
    background: linear-gradient(180deg, rgba(201,165,92,0.14), rgba(201,165,92,0.04));
  }
  .npc-attacks-th {
    font-family: 'Cinzel', serif;
    font-size: 7.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--gold-dim);
    padding: 0.3rem 0.45rem;
    border-right: 1px solid var(--border-subtle);
  }
  .npc-attacks-th:last-child { border-right: none; }
  .npc-attacks-row {
    display: grid;
    grid-template-columns: 1fr 80px 110px;
    gap: 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .npc-attacks-row:last-child { border-bottom: none; }
  .npc-attacks-cell {
    padding: 0.18rem 0.3rem;
    border-right: 1px solid var(--border-subtle);
    display: flex; align-items: center;
  }
  .npc-attacks-cell:last-child { border-right: none; }
  .npc-atk-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 12.5px;
    padding: 0.18rem 0.2rem;
    outline: none;
    transition: background 0.15s;
  }
  .npc-atk-input:focus { background: rgba(201,165,92,0.06); border-radius: 2px; }
  .npc-atk-input::placeholder { color: var(--text-faint); font-style: italic; font-size: 11px; }
  .npc-attacks-footer {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-align: center;
    padding: 0.28rem;
    border-top: 1px solid var(--border-gold);
    background: linear-gradient(180deg, rgba(201,165,92,0.08), rgba(201,165,92,0.02));
  }
  .npc-attacks-add-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.25rem;
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-soft);
    border-radius: 0 0 3px 3px;
    color: var(--text-faint);
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.3rem;
    cursor: pointer;
    transition: all 0.18s;
    margin-top: 2px;
  }
  .npc-attacks-add-btn:hover { color: var(--gold); border-color: var(--border-gold); background: rgba(201,165,92,0.05); }

  /* Sezione azioni/leggendarie */
  .npc-azioni-wrap {
    border: 2px solid var(--border-gold);
    border-radius: 4px;
    background: var(--bg-card);
    overflow: hidden;
    position: relative;
  }
  .npc-azioni-wrap::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    pointer-events: none;
    z-index: 0;
  }
  .npc-azioni-header {
    font-family: 'Cinzel', serif;
    font-size: 7.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--gold-dim);
    padding: 0.28rem 0.45rem;
    border-bottom: 1px solid var(--border-gold);
    background: linear-gradient(180deg, rgba(201,165,92,0.14), rgba(201,165,92,0.04));
    position: relative; z-index: 1;
  }
  .npc-azioni-ta {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    padding: 0.5rem 0.6rem;
    resize: vertical;
    min-height: 90px;
    outline: none;
    line-height: 1.55;
    position: relative; z-index: 1;
    display: block;
    box-sizing: border-box;
  }
  .npc-azioni-ta::placeholder { color: var(--text-faint); font-style: italic; }

  /* API key box */
  .api-key-box {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 0.65rem 0.75rem;
    margin-bottom: 0.6rem;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .api-key-row { display: flex; gap: 0.4rem; align-items: center; }
  .api-key-row input {
    flex: 1;
    background: var(--bg-card-elevated);
    border: 1px solid var(--border-soft);
    color: var(--text-main);
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    padding: 0.38rem 0.6rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-row input:focus { border-color: var(--border-gold); }
  .api-key-hint { font-family: 'EB Garamond', serif; font-size: 11px; color: var(--text-faint); margin-top: 0.3rem; font-style: italic; }
  .api-key-hint a { color: var(--gold-dim); text-decoration: underline; }

  /* btn-gear */
  .btn-gear {
    width: 27px; height: 27px;
    background: transparent;
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    color: var(--text-faint);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .btn-gear:hover { color: var(--gold); border-color: var(--border-gold); }
  .btn-gear.active { color: var(--gold-bright); border-color: var(--border-gold); background: rgba(201,165,92,0.1); }
  .btn-gear svg { width: 13px; height: 13px; }

  /* Bottoni controllo DM — grandi e cliccabili */
  .btn-npc {
    width: 100%; padding: 0.42rem 0.85rem;
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 3px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
    transition: all 0.2s ease; border: 1px solid; line-height: 1.4;
  }
  .btn-npc svg { width: 12px; height: 12px; flex-shrink: 0; }
  .btn-npc-gold {
    background: linear-gradient(180deg, #f0d490, #c9a55c 45%, #a8843e);
    color: #1a1208; border-color: #6b4f23;
    box-shadow: inset 0 1px 0 rgba(255,240,200,0.4);
  }
  .btn-npc-gold:hover { background: linear-gradient(180deg, #ffe4a8, #e0bb6c 45%, #b89346); box-shadow: 0 3px 12px rgba(232,200,120,0.3); }
  .btn-npc-gold:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-npc-dark { background: linear-gradient(180deg, var(--bg-card-elevated), var(--bg-card)); color: var(--gold); border-color: var(--border-soft); }
  .btn-npc-dark:hover { color: var(--gold-bright); border-color: var(--border-gold); }
  .btn-npc-arch { background: linear-gradient(180deg, var(--bg-card-elevated), var(--bg-card)); color: var(--gold); border-color: var(--border-gold); }
  .btn-npc-arch:hover { background: rgba(201,165,92,0.08); }

  /* Spinner inline */
  .npc-spin {
    width: 11px; height: 11px; flex-shrink: 0;
    border: 1.5px solid rgba(26,18,8,0.25); border-top-color: #1a1208;
    border-radius: 50%; animation: npcSpin 0.7s linear infinite;
  }
  @keyframes npcSpin { to { transform: rotate(360deg); } }

  /* Bottone "Salva in archivio" nell'header scheda */
  .btn-save-arch {
    background: linear-gradient(180deg,rgba(201,165,92,0.2),rgba(201,165,92,0.07));
    border: 1px solid var(--border-gold); color: var(--gold-bright);
    font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.28rem 0.6rem; border-radius: 2px; cursor: pointer;
    transition: background 0.2s ease; white-space: nowrap;
  }
  .btn-save-arch:hover { background: linear-gradient(180deg,rgba(201,165,92,0.32),rgba(201,165,92,0.14)); }

  /* Archivio personaggi */
  .archivio-list { display: flex; flex-direction: column; gap: 0.35rem; margin-top: 0.4rem; max-height: 65vh; overflow-y: auto; }
  .archivio-item {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 3px; padding: 0.35rem 0.7rem 0.35rem 0.45rem; cursor: pointer;
    transition: all 0.18s ease;
  }
  .archivio-item:hover { border-color: var(--border-gold); background: var(--bg-card-elevated); }
  /* Thumbnail immagine archivio */
  .archivio-thumb {
    width: 44px; height: 44px; flex-shrink: 0;
    border-radius: 3px; border: 1px solid var(--border-soft);
    overflow: hidden; background: var(--bg-card-elevated);
    display: flex; align-items: center; justify-content: center;
  }
  .archivio-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .archivio-thumb svg { width: 18px; height: 18px; color: var(--text-faint); opacity: 0.4; }
  .archivio-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.1rem; }
  .archivio-item-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .archivio-item-role { font-family: 'EB Garamond', serif; font-size: 11px; font-style: italic; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .archivio-del { background: transparent; border: none; color: var(--text-faint); cursor: pointer; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 2px; transition: all 0.15s; flex-shrink: 0; padding: 0; }
  .archivio-del:hover { color: #ff9c9c; background: rgba(138,46,46,0.15); }
  .archivio-del svg { width: 11px; height: 11px; }
  .archivio-empty { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--text-faint); text-align: center; padding: 1.5rem 0; }
  .city-npc-item { display:flex; align-items:center; gap:0.5rem; padding:0.35rem 0.5rem; background:var(--bg-base); border:1px solid var(--border-subtle); border-radius:4px; margin-bottom:0.3rem; }
  .city-npc-thumb { width:38px; height:38px; border-radius:3px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border-soft); }
  .city-npc-thumb img { width:100%; height:100%; object-fit:cover; }
  .city-npc-info { flex:1; min-width:0; }
  .city-npc-name { font-family:'Cinzel',serif; font-size:11px; font-weight:700; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .city-npc-role { font-family:'EB Garamond',serif; font-size:13px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-reabilita { font-family:'Cinzel',serif; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; padding:0.25rem 0.4rem; background:var(--bg-card); border:1px solid var(--border-gold); color:var(--gold); border-radius:3px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  .btn-reabilita:hover { background:var(--bg-card-elevated); }

  /* Scheda Personaggio */
  .scheda-grid { display:grid; grid-template-columns:110px 210px 1fr 1fr; gap:0.75rem; }
  @media (max-width:1100px) { .scheda-grid { grid-template-columns:110px 210px 1fr; } }
  @media (max-width:760px) { .scheda-grid { grid-template-columns:1fr 1fr; } }
  @media (max-width:500px) { .scheda-grid { grid-template-columns:1fr; } }

  /* Bestiario Custom */
  .bestiario-form { display:flex; flex-direction:column; gap:0.5rem; padding:1rem; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:4px; margin-bottom:1rem; }
  .bestiario-form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; }
  .bestiario-field-lbl { font-family:'Cinzel',serif; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:var(--gold-dim); margin-bottom:0.2rem; display:block; }
  .bestiario-field-input { width:100%; background:var(--bg-base); border:1px solid var(--border-soft); color:var(--text-main); font-family:'EB Garamond',serif; font-size:15px; padding:0.4rem 0.6rem; border-radius:3px; outline:none; transition:border-color 0.2s; box-sizing:border-box; }
  .bestiario-field-input:focus { border-color:var(--border-gold); }
  .bestiario-field-textarea { resize:vertical; min-height:120px; font-family:'EB Garamond',serif; font-size:15px; }
  .bestiario-img-preview { width:100%; max-height:180px; object-fit:cover; border-radius:3px; border:1px solid var(--border-soft); margin-top:0.3rem; display:none; }

  /* City Tracker (mappa flag panel) */
  .city-section { border:1px solid var(--border-subtle); border-radius:4px; margin-bottom:0.5rem; overflow:hidden; }
  .city-section-header { display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0.75rem; background:var(--bg-card); cursor:pointer; font-family:'Cinzel',serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--gold); user-select:none; }
  .city-section-header:hover { background:var(--bg-card-elevated); }
  .city-section-body { padding:0.6rem 0.75rem; display:flex; flex-direction:column; gap:0.4rem; background:var(--bg-panel); }
  .city-section-body.collapsed { display:none; }
  .city-poi-item { display:flex; align-items:center; gap:0.4rem; font-family:'EB Garamond',serif; font-size:15px; color:var(--text-main); }
  .city-poi-del { background:none; border:none; color:var(--text-faint); cursor:pointer; padding:0 0.2rem; font-size:14px; }
  .city-poi-del:hover { color:var(--blood); }
  .city-add-row { display:flex; gap:0.35rem; }
  .city-add-inp { flex:1; background:var(--bg-base); border:1px solid var(--border-soft); color:var(--text-main); font-family:'EB Garamond',serif; font-size:14px; padding:0.3rem 0.5rem; border-radius:3px; outline:none; }
  .city-add-inp:focus { border-color:var(--border-gold); }
  .city-add-btn { background:var(--bg-card); border:1px solid var(--border-soft); color:var(--gold); font-family:'Cinzel',serif; font-size:9px; padding:0.3rem 0.5rem; border-radius:3px; cursor:pointer; white-space:nowrap; text-transform:uppercase; letter-spacing:0.08em; }
  .city-add-btn:hover { border-color:var(--border-gold); }

  /* NPC Status Vitale */
  .npc-status-row { display:flex; gap:0.35rem; margin-top:0.35rem; }
  .npc-status-btn { flex:1; padding:0.25rem 0.3rem; font-family:'Cinzel',serif; font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; border-radius:3px; cursor:pointer; border:1px solid var(--border-subtle); background:var(--bg-card); color:var(--text-faint); transition:all 0.2s; }
  .npc-status-btn.active-vivo { border-color:#60c870; background:rgba(96,200,112,0.15); color:#60c870; }
  .npc-status-btn.active-ferito { border-color:var(--blood); background:rgba(138,46,46,0.2); color:#ff9c9c; }
  .npc-status-btn.active-morto { border-color:#555; background:rgba(50,50,50,0.3); color:var(--text-faint); text-decoration:line-through; }

  /* Badge età — sovrapposto sull'avatar */
  .npc-eta-badge {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.72); border: 1px solid var(--border-gold);
    border-radius: 3px; padding: 1px 5px;
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
    color: var(--gold-bright); white-space: nowrap; pointer-events: none;
    letter-spacing: 0.04em;
  }
  /* Input età — inline accanto ai bottoni avatar */
  .npc-eta-row {
    display: flex; align-items: center; gap: 0.3rem; width: 136px;
  }
  .npc-eta-row label {
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-dim);
    white-space: nowrap;
  }
  .npc-eta-input {
    flex: 1; min-width: 0; background: var(--bg-card);
    border: 1px solid var(--border-subtle); color: var(--text-main);
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
    text-align: center; padding: 0.18rem 0.3rem; border-radius: 2px; outline: none;
    transition: border-color 0.2s;
  }
  .npc-eta-input:focus { border-color: var(--border-gold); }

  /* =========================================================
     === DRAG AND DROP INIZIATIVA ===
     ========================================================= */
  .combatant-card { position: relative; }
  .drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    color: var(--text-faint);
    cursor: grab;
    flex-shrink: 0;
    transition: color 0.2s;
    padding: 0 2px;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: var(--gold-dim); }
  .combatant-card.drag-over {
    border-color: var(--gold) !important;
    box-shadow: 0 0 0 2px var(--gold-glow), var(--shadow-card) !important;
  }
  .combatant-card.dragging {
    opacity: 0.45;
    transform: scale(0.98);
  }

  .doom-modal-btn.alt {
    background: linear-gradient(180deg, var(--bg-card-elevated), var(--bg-card));
    color: var(--gold);
    border: 1px solid var(--border-soft);
  }
  .doom-modal-btn.alt:hover {
    color: var(--gold-bright);
    border-color: var(--border-gold);
    background: var(--bg-card-elevated);
  }

  /* ============================================================
     SCHERMATA DI LOGIN — Scena fotorealistica come sfondo
     ============================================================ */
  @keyframes loginSceneEnter {
    0%   { opacity: 0; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1);    }
  }
  @keyframes loginPanelEnter {
    0%   { opacity: 0; transform: translateY(8px); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0);   }
  }
  @keyframes loginFleurGlow {
    0%,100% { filter: drop-shadow(0 0 6px rgba(255,210,120,0.45)); }
    50%     { filter: drop-shadow(0 0 14px rgba(255,220,140,0.85)); }
  }
  @keyframes loginBtnShimmer {
    0%   { background-position: -120% 0; }
    100% { background-position: 220% 0;  }
  }
  @keyframes loginLightBurst {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.25); }
    25%  { opacity: 1; }
    55%  { opacity: 1; transform: translate(-50%,-50%) scale(2.2); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(4.5); }
  }
  @keyframes loginWhiteOut {
    0%   { opacity: 0; }
    50%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes loginSceneZoom {
    0%   { transform: scale(1);    filter: brightness(1);   }
    100% { transform: scale(1.18); filter: brightness(1.6); }
  }

  #login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #07050a;
    display: grid; place-items: center;
    overflow: hidden;
    font-family: 'EB Garamond', Georgia, serif;
  }

  /* Container che mantiene il rapporto 1024:507 dell'immagine */
  .login-scene {
    position: relative;
    width:  min(100vw, calc(100vh * 1024 / 507));
    height: min(100vh, calc(100vw * 507 / 1024));
    background-image: url('img/Strade_della_città.png');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    container-type: inline-size;
    animation: loginSceneEnter 0.9s ease-out;
  }

  /* Zona del form posizionata esattamente sopra l'interno del forziere */
  .login-form-area {
    position: absolute;
    left: 38.2%;
    top:  39.8%;
    width: 23.8%;
    height: 37%;
    /* Mascheramento scuro per coprire il form dipinto sotto */
    background:
      linear-gradient(180deg, rgba(12,7,3,0.96) 0%, rgba(8,5,2,0.97) 100%);
    border-radius: 1px;
    box-shadow: inset 0 0 22px rgba(0,0,0,0.6);
    padding: 1.1cqw 1.3cqw 1.2cqw;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 0.55cqw;
    animation: loginPanelEnter 0.7s ease-out 0.2s both;
  }

  .login-field { display: flex; flex-direction: column; gap: 0.25cqw; }
  .login-field-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62cqw;
    letter-spacing: 0.18em;
    color: #c9a55c;
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 1px 1px rgba(0,0,0,0.7);
  }
  .login-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    background: rgba(6, 3, 1, 0.92);
    border: 1px solid rgba(201, 165, 92, 0.42);
    border-radius: 2px;
    padding: 0.42cqw 0.55cqw;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input-wrap:focus-within {
    border-color: rgba(232, 200, 120, 0.85);
    box-shadow: 0 0 0 2px rgba(232,200,120,0.12);
  }
  .login-input-wrap svg.login-input-ico {
    width: 0.95cqw; height: 0.95cqw;
    flex-shrink: 0; margin-right: 0.45cqw;
    opacity: 0.72;
  }
  .login-input-wrap input {
    flex: 1; min-width: 0;
    background: none; border: none; outline: none;
    color: #f0d490;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 0.88cqw;
    letter-spacing: 0.02em;
    padding: 0;
  }
  .login-input-wrap input::placeholder { color: rgba(232, 200, 120, 0.35); font-style: italic; }
  .login-input-wrap input:-webkit-autofill { -webkit-text-fill-color: #f0d490; -webkit-box-shadow: 0 0 0 30px rgba(6,3,1,0.92) inset; }

  .login-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 0.5cqw; margin: 0.15cqw 0;
    color: rgba(201, 165, 92, 0.55);
    font-size: 0.55cqw;
    letter-spacing: 0.3em;
  }
  .login-divider::before,
  .login-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,165,92,0.4), transparent);
  }

  .login-btn {
    position: relative; overflow: hidden;
    background:
      linear-gradient(110deg,
        transparent 0%, transparent 30%,
        rgba(255,240,200,0.55) 50%,
        transparent 70%, transparent 100%),
      linear-gradient(180deg, #f5d68c 0%, #d4ac5c 50%, #a37828 100%);
    background-size: 200% 100%, 100% 100%;
    background-position: -120% 0, 0 0;
    border: 1px solid #6a4e1a;
    color: #2a1808;
    font-family: 'Cinzel', serif;
    font-size: 0.82cqw;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.72cqw 1cqw;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow:
      inset 0 1px 0 rgba(255,240,200,0.6),
      inset 0 -1px 0 rgba(80,50,20,0.4),
      0 2px 6px rgba(0,0,0,0.7);
    transition: transform 0.12s, filter 0.12s;
    margin-top: 0.4cqw;
    animation: loginBtnShimmer 4s ease-in-out infinite;
  }
  .login-btn:hover  { filter: brightness(1.08); }
  .login-btn:active { transform: translateY(1px); filter: brightness(0.95); }
  .login-btn .login-btn-ico { display: inline-block; margin-right: 0.35em; transform: translateY(-1px); }
  .login-btn .login-btn-short { display: none; }
  .login-btn .login-btn-full  { display: inline; }

  .login-error {
    display: none;
    color: #e25858;
    font-size: 0.68cqw;
    text-align: center;
    margin-top: 0.25cqw;
    font-style: italic;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
  }

  /* ====== ANIMAZIONE DI APERTURA (login riuscito) ====== */
  .login-burst {
    position: absolute;
    left: 50%; top: 47%;
    width: 32%; height: 64%;
    transform: translate(-50%,-50%) scale(0.3);
    background: radial-gradient(circle,
      rgba(255,252,235,1) 0%,
      rgba(255,235,170,0.95) 14%,
      rgba(255,200,100,0.85) 28%,
      rgba(255,160,60,0.55) 45%,
      rgba(255,120,30,0.25) 65%,
      transparent 80%);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }
  .login-whiteout {
    position: absolute; inset: 0;
    background: #fffcef;
    opacity: 0; pointer-events: none;
  }
  #login-overlay.opening .login-scene     { animation: loginSceneZoom 1.5s ease-in forwards; }
  #login-overlay.opening .login-form-area {
    animation: none;
    opacity: 0;
    transition: opacity 0.3s ease-out;
  }
  #login-overlay.opening .login-burst     { animation: loginLightBurst 1.5s cubic-bezier(.18,.7,.4,1) forwards; }
  #login-overlay.opening .login-whiteout  { animation: loginWhiteOut 0.7s ease-in 1s forwards; }

  /* ====== MOBILE / TABLET portrait ======
     L'immagine ha aspect 2:1: su viewport "portrait" non c'è modo di mostrarla
     intera senza letterbox enormi né di ingrandirla senza tagliare i lati.
     Soluzione: ingrandiamo la scena tanto quanto serve perché il form occupi
     spazio verticale sufficiente (~150 px) dentro al forziere.
     I prop laterali vengono parzialmente tagliati ma il forziere resta centrato. */
  @media (max-aspect-ratio: 4/3) {
    .login-scene {
      width:  210vw;
      height: calc(210vw * 507 / 1024);
    }
    .login-form-area {
      padding: 11px 13px;
      gap: 7px;
    }
    .login-field-label  { font-size: 9.5px; letter-spacing: 0.14em; }
    .login-input-wrap   { padding: 5px 8px; border-radius: 2px; }
    .login-input-wrap input { font-size: 13px; }
    .login-input-wrap svg.login-input-ico { width: 13px; height: 13px; margin-right: 6px; }
    .login-divider      { font-size: 7px; gap: 8px; }
    .login-btn          { font-size: 10.5px; padding: 8px 10px; letter-spacing: 0.08em; margin-top: 3px; }
    .login-btn .login-btn-short { display: inline; }
    .login-btn .login-btn-full  { display: none; }
    .login-error        { font-size: 9.5px; }
  }
  @media (max-aspect-ratio: 4/3) and (min-width: 600px) {
    .login-scene {
      width:  130vw;
      height: calc(130vw * 507 / 1024);
    }
    .login-form-area { padding: 16px 20px; gap: 10px; }
    .login-field-label  { font-size: 11px; }
    .login-input-wrap   { padding: 7px 10px; }
    .login-input-wrap input { font-size: 14px; }
    .login-input-wrap svg.login-input-ico { width: 15px; height: 15px; margin-right: 8px; }
    .login-divider      { font-size: 8px; }
    .login-btn          { font-size: 12px; padding: 11px 14px; letter-spacing: 0.14em; }
    .login-error        { font-size: 11px; }
  }

  /* ============================================================
     PANNELLO IMPOSTAZIONI
     ============================================================ */
  #settings-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .settings-box {
    background: var(--bg-panel);
    border: 1px solid var(--border-gold);
    border-radius: 6px;
    width: 100%; max-width: 540px;
    max-height: 88vh; overflow-y: auto;
    box-shadow: var(--shadow-modal);
  }
  .settings-head {
    padding: 1.1rem 1.4rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between;
  }
  .settings-title {
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold-bright);
  }
  .settings-body { padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .settings-section-lbl {
    font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold-dim);
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.3rem;
    margin-bottom: 0.75rem;
  }
  .settings-user-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.55rem 0.75rem;
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 3px; margin-bottom: 0.4rem;
  }
  .settings-user-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text-strong); }
  .settings-user-status {
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 0.2rem 0.55rem; border-radius: 20px;
  }
  .status-online { background: rgba(60,180,80,0.2); color: #80e890; border: 1px solid rgba(60,180,80,0.4); }
  .status-offline { background: rgba(100,100,100,0.15); color: var(--text-faint); border: 1px solid var(--border-subtle); }

  /* Toggle switch */
  .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--bg-card); border: 1px solid var(--border-soft);
    border-radius: 22px; transition: 0.25s;
  }
  .toggle-slider:before {
    content: ''; position: absolute;
    width: 16px; height: 16px;
    left: 2px; top: 2px; border-radius: 50%;
    background: var(--text-faint); transition: 0.25s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--gold-dim); border-color: var(--gold); }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--gold-bright); }

  /* Bottone ingranaggio in alto a sinistra */
  .gear-btn {
    position: fixed; top: 0.75rem; left: 0.75rem; z-index: 500;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--bg-panel-glass);
    border: 1px solid var(--border-gold);
    color: var(--gold-dim); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; backdrop-filter: blur(4px);
  }
  .gear-btn:hover { color: var(--gold-bright); transform: rotate(30deg); }
  .gear-btn svg { width: 17px; height: 17px; }

  /* Badge utente corrente */
  .user-badge {
    position: fixed; top: 0.75rem; left: 3.2rem; z-index: 500;
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--gold-dim); background: var(--bg-panel-glass);
    border: 1px solid var(--border-subtle);
    border-radius: 20px; padding: 0.25rem 0.65rem;
    backdrop-filter: blur(4px);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .user-badge .online-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #80e890;
    animation: pulse 2s infinite;
  }

  /* Form creazione account */
  .create-account-form {
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 4px; padding: 1rem; display: flex;
    flex-direction: column; gap: 0.65rem; margin-top: 0.5rem;
  }
  .create-account-form input {
    background: var(--bg-card-elevated);
    border: 1px solid var(--border-soft);
    color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 15px;
    padding: 0.55rem 0.75rem; border-radius: 3px; outline: none;
    transition: border-color 0.2s;
  }
  .create-account-form input:focus { border-color: var(--border-gold); }

  /* ============================================================
     SEZIONE LANCIATORE DI DADI
     ============================================================ */
  .dice-wrap { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
  .dice-panel {
    background: linear-gradient(165deg, var(--bg-card-elevated), var(--bg-card));
    border: 1px solid var(--border-gold);
    border-radius: 8px; padding: 2rem;
    box-shadow: var(--shadow-card); text-align: center;
  }
  .dice-result-display {
    font-family: 'Uncial Antiqua', serif;
    font-size: 5rem; line-height: 1;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 50%, var(--gold-dim));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: none; margin: 1rem 0;
    filter: drop-shadow(0 0 20px rgba(201,165,92,0.4));
    min-height: 6rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .dice-result-display.crit { background: linear-gradient(180deg,#fff8c0,#ffd060); -webkit-background-clip:text; background-clip:text; filter:drop-shadow(0 0 28px rgba(255,220,60,0.8)); }
  .dice-result-display.fail { background: linear-gradient(180deg,#ff9090,#c84040); -webkit-background-clip:text; background-clip:text; filter:drop-shadow(0 0 24px rgba(200,60,60,0.7)); }
  .dice-type-grid { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .dice-type-btn {
    padding: 0.55rem 1.1rem; border-radius: 4px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    border: 1px solid var(--border-soft); color: var(--text-muted);
    background: var(--bg-card); transition: all 0.2s ease;
  }
  .dice-type-btn:hover { border-color: var(--border-gold); color: var(--gold); }
  .dice-type-btn.active {
    background: linear-gradient(180deg, rgba(201,165,92,0.25), rgba(139,111,63,0.15));
    border-color: var(--gold); color: var(--gold-bright);
    box-shadow: 0 0 12px rgba(201,165,92,0.2);
  }
  .dice-roll-btn {
    background: linear-gradient(180deg, #c9a55c, #7a5c28);
    border: 1px solid #6b4f23; color: #1a1208;
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.18em;
    padding: 0.9rem 2.5rem; border-radius: 5px; cursor: pointer;
    transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 14px;
  }
  .dice-roll-btn:hover { background: linear-gradient(180deg,#e0b870,#9a7030); box-shadow: 0 6px 24px rgba(201,165,92,0.45); transform: translateY(-2px); }
  .dice-roll-btn:active { transform: translateY(0); }
  .dice-history { margin-top: 1.5rem; border-top: 1px solid var(--border-subtle); padding-top: 1rem; }
  .dice-history-title {
    font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold-dim);
    margin-bottom: 0.65rem;
  }
  .dice-history-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 180px; overflow-y: auto; }
  .dice-history-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.35rem 0.75rem; border-radius: 3px;
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    font-family: 'Cinzel', serif; font-size: 11px; color: var(--text-muted);
  }
  .dice-history-value { font-size: 15px; font-weight: 800; color: var(--gold-bright); min-width: 28px; text-align: center; }
  .dice-history-value.crit { color: #ffd060; }
  .dice-history-value.fail { color: #ff8080; }
  .dice-anim { animation: dice-pop 0.3s cubic-bezier(0.2,1.4,0.5,1) forwards; }
  @keyframes dice-pop {
    0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ============================================================
     MAPPA DEL MONDO
     ============================================================ */
  .mappa-wrap { display:flex; height:calc(100vh - 120px); min-height:500px; position:relative; overflow:hidden; }
  .mappa-container { flex:1; position:relative; background:#b8d4e8; }
  #leaflet-map { width:100%; height:100%; background:radial-gradient(ellipse at center,#c8e0f0 0%,#a0c4dc 60%,#88aac8 100%); }
  .leaflet-container { font-family:'EB Garamond',Georgia,serif; }
  .mappa-no-img {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; color:var(--text-muted); font-family:'Cinzel',serif; text-align:center; gap:1rem;
    background:radial-gradient(ellipse at center,rgba(180,220,240,0.15),transparent);
  }
  .mappa-no-img svg { width:64px; height:64px; color:var(--gold-dim); opacity:0.5; }
  .mappa-no-img-title { font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:0.2em; color:var(--gold-dim); }
  .mappa-no-img-sub { font-size:13px; font-style:italic; color:var(--text-faint); }

  .mappa-dm-controls {
    position:absolute; top:1rem; left:1rem; z-index:1000; display:flex; gap:0.5rem; flex-direction:column;
  }
  .mappa-btn {
    display:inline-flex; align-items:center; gap:0.4rem;
    padding:0.5rem 0.85rem; border-radius:3px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.12em; border:1px solid;
    background:var(--bg-panel-glass); backdrop-filter:blur(8px);
    color:var(--text-main); border-color:var(--border-soft);
    transition:all 0.18s; white-space:nowrap;
  }
  .mappa-btn:hover { color:var(--gold-bright); border-color:var(--border-gold); }
  .mappa-btn.active { background:linear-gradient(180deg,rgba(201,165,92,0.3),rgba(201,165,92,0.12)); color:var(--gold-bright); border-color:var(--gold); box-shadow:0 0 12px rgba(201,165,92,0.25); }
  .mappa-btn-add-map { background:linear-gradient(180deg,rgba(100,180,100,0.25),rgba(60,140,60,0.12)); color:#a0d8a0; border-color:rgba(100,180,100,0.5); }
  .mappa-btn-add-map:hover { background:rgba(100,180,100,0.35); }

  /* Pannello informazioni flag — scorrevole da destra */
  .mappa-info-panel {
    position:absolute; right:0; top:0; bottom:0;
    width:440px; background:var(--bg-sidebar);
    border-left:1px solid var(--border-gold);
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform 0.3s ease;
    z-index:1001; box-shadow:-8px 0 32px rgba(0,0,0,0.5);
  }
  .mappa-info-panel.open { transform:translateX(0); }
  .mappa-info-header {
    padding:0.85rem 1rem 0.65rem;
    border-bottom:1px solid var(--border-soft);
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg-sidebar); position:sticky; top:0; z-index:2;
  }
  .mappa-info-title { font-family:'Cinzel',serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.2em; color:var(--gold-bright); }
  .mappa-info-body { flex:1; overflow-y:auto; padding:0.85rem; display:flex; flex-direction:column; gap:0.75rem; }
  .mappa-field-lbl { font-family:'Cinzel',serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--gold-dim); margin-bottom:0.3rem; display:block; }
  .mappa-field-input {
    width:100%; background:var(--bg-card); border:1px solid var(--border-soft);
    color:var(--text-main); font-family:'EB Garamond',serif; font-size:16px;
    padding:0.55rem 0.75rem; border-radius:3px; outline:none; transition:border-color 0.2s;
  }
  .mappa-field-input:focus { border-color:var(--border-gold); }
  .mappa-field-textarea { resize:vertical; min-height:110px; }
  .mappa-field-readonly {
    background:transparent; border:none; border-bottom:1px solid var(--border-subtle);
    color:var(--text-main); font-family:'EB Garamond',serif; font-size:17px;
    font-style:italic; padding:0.3rem 0; width:100%; line-height:1.55;
  }
  .mappa-field-readonly-name { font-family:'Cinzel',serif; font-size:20px; font-weight:700; color:var(--gold-bright); font-style:normal; border:none; background:transparent; width:100%; }
  .mappa-impresa-img { width:100%; max-height:220px; object-fit:cover; border-radius:3px; border:1px solid var(--border-soft); margin-top:0.3rem; }
  .mappa-impresa-placeholder { width:100%; height:100px; background:var(--bg-card); border:1px dashed var(--border-subtle); border-radius:3px; display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:12px; font-style:italic; margin-top:0.3rem; }

  /* Slider reputazione */
  .rep-slider-wrap { display:flex; flex-direction:column; gap:0.4rem; }
  .rep-slider-labels { display:flex; justify-content:space-between; font-family:'Cinzel',serif; font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
  .rep-lbl-bad   { color:#c84040; }
  .rep-lbl-neu   { color:var(--gold-dim); }
  .rep-lbl-good  { color:#60c870; }
  .rep-slider {
    -webkit-appearance:none; appearance:none;
    width:100%; height:8px; border-radius:4px; outline:none; cursor:pointer;
    background: linear-gradient(90deg, #8a2424 0%, #c87a3a 25%, #6a6a1a 50%, #3a7a3a 75%, #1a7a2a 100%);
    border:1px solid var(--border-soft);
  }
  .rep-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #ffe87a, #d4a820 60%, #8b5e08);
    border:2px solid #7a4e08; cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
  }
  .rep-slider::-moz-range-thumb {
    width:20px; height:20px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #ffe87a, #d4a820 60%, #8b5e08);
    border:2px solid #7a4e08; cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
  }
  .rep-value-display {
    text-align:center; font-family:'Cinzel',serif; font-size:11px; font-weight:700;
    letter-spacing:0.08em; padding:0.25rem 0.5rem; border-radius:3px;
    border:1px solid; transition:all 0.3s;
  }

  /* Marker flag sulla mappa */
  .mappa-flag-icon { display:flex; align-items:center; justify-content:center; }

  /* ============================================================
     BACHECA DEI RICERCATI v2 — drag-and-drop libero
     ============================================================ */
  .bacheca-page { display:flex; flex-direction:column; min-height:100vh; }
  .bacheca-toolbar {
    display:flex; align-items:center; gap:0.75rem; padding:0.55rem 1.2rem;
    background:var(--bg-sidebar); border-bottom:1px solid var(--border-soft);
    flex-wrap:wrap; position:sticky; top:0; z-index:10;
  }
  .bacheca-toolbar-title {
    font-family:'Cinzel',serif; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.2em; color:var(--gold-bright); margin-right:0.5rem;
  }
  .bacheca-btn {
    display:inline-flex; align-items:center; gap:0.4rem;
    padding:0.42rem 0.85rem; border-radius:3px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:9px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.12em;
    background:linear-gradient(180deg,rgba(200,130,30,0.3),rgba(140,70,10,0.18));
    color:#d4a050; border:1px solid rgba(200,130,30,0.5); transition:all 0.18s; white-space:nowrap;
  }
  .bacheca-btn:hover { background:rgba(200,130,30,0.4); box-shadow:0 4px 12px rgba(200,130,30,0.2); }
  .bacheca-hint {
    font-family:'EB Garamond',serif; font-style:italic; font-size:13px;
    color:var(--text-faint); margin-left:auto;
  }

  /* Manifesto draggabile */
  .bache-item {
    position:absolute; width:160px; cursor:grab; user-select:none; -webkit-user-select:none;
    filter:drop-shadow(3px 4px 10px rgba(0,0,0,0.75)); transition:filter 0.15s;
  }
  .bache-item:hover { filter:drop-shadow(4px 6px 16px rgba(0,0,0,0.9)) brightness(1.06); }
  .bache-item.dragging { cursor:grabbing; z-index:9999 !important; filter:drop-shadow(6px 8px 20px rgba(0,0,0,0.95)) brightness(1.08); transition:none; }
  .bache-item.pinned { cursor:default; }
  .bache-item.pinned:hover { filter:drop-shadow(3px 4px 10px rgba(0,0,0,0.75)); }
  /* Chiodo dorato */
  .bache-pin {
    position:absolute; top:-11px; left:50%; transform:translateX(-50%);
    width:18px; height:18px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffd880, #8b5a10);
    box-shadow:0 2px 6px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,230,120,0.5);
    z-index:2; border:1px solid rgba(100,60,0,0.6); display:none;
  }
  .bache-item.pinned .bache-pin { display:block; }
  /* Flip card */
  .bache-inner { position:relative; width:100%; transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); }
  .bache-item.flipped .bache-inner { transform:rotateY(180deg); }
  .bache-face, .bache-back { width:100%; border-radius:4px; overflow:hidden; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
  .bache-face { position:relative; box-shadow:0 3px 8px rgba(0,0,0,0.5); background:#1a1008; }
  .bache-face img { width:100%; display:block; min-height:120px; max-height:210px; object-fit:cover; }
  .bache-resize-handle {
    position:absolute; background:rgba(255,220,100,0.0); z-index:20;
    transition:background 0.15s;
  }
  .bache-resize-handle:hover { background:rgba(255,220,100,0.25); }
  .bache-rh-se { bottom:0; right:0; width:14px; height:14px; border-radius:0 0 4px 0; }
  .bache-rh-sw { bottom:0; left:0;  width:14px; height:14px; border-radius:0 0 0 4px; }
  .bache-rh-e  { top:14px; right:0; width:7px;  bottom:14px; }
  .bache-rh-w  { top:14px; left:0;  width:7px;  bottom:14px; }
  .bache-back {
    position:absolute; top:0; left:0; right:0; bottom:0;
    transform:rotateY(180deg);
    background:linear-gradient(160deg,#f5e8c8,#e8d4a0,#d4b870);
    padding:0.8rem 0.65rem; display:flex; flex-direction:column; gap:0.4rem; min-height:120px;
  }
  .bache-back-stamp {
    font-family:'Cinzel',serif; font-size:15px; font-weight:900;
    color:rgba(160,30,30,0.85); text-transform:uppercase; letter-spacing:0.04em;
    border:2px solid rgba(160,30,30,0.7); display:inline-block;
    padding:0.05rem 0.35rem; border-radius:2px; align-self:center;
    transform:rotate(-7deg); text-shadow:1px 1px 0 rgba(0,0,0,0.15);
  }
  .bache-comment-ta {
    flex:1; background:transparent; border:none; border-bottom:1px dashed rgba(120,70,20,0.45);
    resize:none; font-family:'EB Garamond',serif; font-style:italic; font-size:12px;
    color:#4a2a08; outline:none; min-height:52px; line-height:1.4; padding:0.15rem;
  }
  .bache-comment-ta::placeholder { color:rgba(100,60,20,0.4); }
  .bache-comment-ro {
    font-family:'EB Garamond',serif; font-style:italic; font-size:12px;
    color:#4a2a08; line-height:1.45; text-align:center; padding:0.2rem; flex:1;
  }
  .bache-back-sig {
    font-family:'Cinzel',serif; font-size:7.5px; font-weight:700;
    color:rgba(120,70,20,0.5); text-transform:uppercase; letter-spacing:0.1em;
    text-align:right; margin-top:auto;
  }
  /* Controlli hover DM */
  .bache-controls {
    position:absolute; top:3px; left:3px; right:3px;
    display:flex; gap:3px; opacity:0; transition:opacity 0.18s; z-index:10; pointer-events:none;
  }
  .bache-item:hover .bache-controls { opacity:1; pointer-events:all; }
  .bache-ctrl-btn {
    padding:2px 5px; border-radius:2px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:7.5px; font-weight:700;
    border:1px solid; backdrop-filter:blur(4px); white-space:nowrap; transition:all 0.14s; line-height:1.5;
  }
  .bache-ctrl-pin { background:rgba(0,0,0,0.75); color:#ffd88a; border-color:rgba(200,160,60,0.6); }
  .bache-ctrl-pin:hover { background:rgba(200,160,40,0.3); }
  .bache-ctrl-pin.active { background:rgba(200,160,40,0.25); color:#ffe080; }
  .bache-ctrl-del { background:rgba(0,0,0,0.75); color:#ffa0a0; border-color:rgba(200,60,60,0.5); margin-left:auto; }
  .bache-ctrl-del:hover { background:rgba(200,60,60,0.3); }
  /* Bottone zoom (lente) — visibile a tutti */
  .bache-zoom-btn {
    position:absolute; bottom:6px; right:6px; z-index:15;
    width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,0.62); color:#ffe0a0;
    border:1px solid rgba(220,180,90,0.6);
    display:flex; align-items:center; justify-content:center;
    cursor:zoom-in; font-size:15px; line-height:1;
    backdrop-filter:blur(4px); opacity:0;
    transition:opacity 0.18s, background 0.14s, transform 0.14s;
  }
  .bache-item:hover .bache-zoom-btn { opacity:1; }
  .bache-zoom-btn:hover { background:rgba(200,160,40,0.45); transform:scale(1.1); }
  .bacheca-empty {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; color:rgba(220,180,100,0.5);
    font-family:'EB Garamond',serif; font-style:italic; font-size:17px;

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-scene">
    <!-- Sovrapposizione: form posizionato dentro al forziere -->
    <div class="login-form-area">
      <div class="login-field">
        <label class="login-field-label" for="login-user">Nome Avventuriero</label>
        <div class="login-input-wrap">
          <svg class="login-input-ico" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 3 L5 6 v6 c0 4.5 3 8 7 9 4-1 7-4.5 7-9 V6 Z" stroke="#c9a55c" stroke-width="1.6" stroke-linejoin="round" fill="rgba(201,165,92,0.08)"/>

          </svg>
          <input id="login-user" type="text" placeholder="Inserisci il tuo nome…" autocomplete="username" onkeydown="if(event.key==='Enter')tentaLogin();" />
        </div>

function _schedaDefault() {
